<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1D3C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
  :root{
    --primary:#F3A616; --primary-hover:#D6900E; --secondary:#0A1D3C; --secondary-light:#163666;
    --bg:#F8FAFC; --surface:#FFFFFF; --success:#10B981; --danger:#EF4444;
    --text-main:#0F172A; --text-muted:#64748B; --border:#F1F5F9;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'DM Sans',sans-serif; background:#EEF1F6; color:var(--text-main); -webkit-tap-highlight-color:transparent; perspective:1200px;}
  h1,h2,h3,h4,.heading{font-family:'Plus Jakarta Sans',sans-serif; letter-spacing:-0.02em;}
  .app{max-width:448px; margin:0 auto; width:100%; min-height:100vh; background:var(--bg); position:relative; padding-bottom:100px; overflow-x:hidden; box-shadow:0 0 80px rgba(15,23,42,.12);}
  .hidden{display:none !important;}
  button{font-family:inherit; cursor:pointer;}
  input{font-family:inherit;}
  .btn-primary{background:linear-gradient(180deg,#FBC55D,var(--primary) 55%,var(--primary-hover)); color:#fff; font-weight:700; border:none; border-radius:999px; padding:16px; font-size:15px; transition:transform .12s, box-shadow .12s; box-shadow:0 1px 0 rgba(255,255,255,.35) inset, 0 -3px 6px rgba(0,0,0,.12) inset, 0 12px 22px -8px rgba(243,166,22,.5);}
  .btn-primary:active{transform:translateY(2px) scale(.98); box-shadow:0 1px 0 rgba(255,255,255,.2) inset, 0 -1px 3px rgba(0,0,0,.1) inset, 0 4px 10px -6px rgba(249,115,22,.5);}
  .btn-primary:disabled{opacity:.5;}
  .btn-outline{background:linear-gradient(180deg,#fff,#F8FAFC); color:var(--text-main); font-weight:700; border:1.5px solid var(--border); border-radius:999px; padding:14px; font-size:14px; transition:transform .12s, box-shadow .12s; box-shadow:0 1px 0 #fff inset, 0 3px 8px rgba(15,23,42,.06);}
  .btn-outline:active{transform:translateY(1px) scale(.98); box-shadow:0 1px 3px rgba(15,23,42,.08) inset;}
  .field-input{width:100%; padding:15px 17px; border-radius:14px; border:1.5px solid var(--border); background:#F8FAFC; font-size:15px; color:var(--text-main); outline:none; transition:border-color .15s, background .15s, box-shadow .15s; box-shadow:0 1px 3px rgba(15,23,42,.04) inset;}
  .field-input:focus{border-color:var(--primary); background:#fff; box-shadow:0 0 0 4px rgba(249,115,22,.1);}
  .card{background:linear-gradient(180deg,#fff,#FCFDFE); border-radius:24px; border:1px solid #F1F5F9; box-shadow:0 1px 0 #fff inset, 0 14px 34px -10px rgba(15,23,42,.09), 0 3px 8px rgba(15,23,42,.04);}
  .shell{padding:0 24px;}
  .fade-in{animation:fadeSlideUp .35s ease both;}
  @keyframes fadeSlideUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
  .spin{width:18px; height:18px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .bottom-nav{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:448px; background:rgba(255,255,255,.92); backdrop-filter:blur(16px); border-top:1px solid var(--border); padding:10px 18px calc(10px + env(safe-area-inset-bottom)); display:flex; justify-content:space-between; align-items:center; z-index:50; border-radius:24px 24px 0 0; box-shadow:0 1px 0 #fff inset, 0 -10px 30px rgba(15,23,42,.06);}
  .nav-btn{display:flex; flex-direction:column; align-items:center; gap:5px; color:var(--text-muted); background:none; border:none; font-size:10px; font-weight:700; flex:1; padding:6px 4px; transition:color .15s;}
  .nav-btn .nav-ic{width:34px; height:26px; border-radius:12px; display:flex; align-items:center; justify-content:center; transition:background .25s, box-shadow .25s, transform .15s;}
  .nav-btn.active{color:var(--primary);}
  .nav-btn.active .nav-ic{background:linear-gradient(180deg,#FFEDD9,#FFE0BD); box-shadow:0 1px 0 #fff inset, 0 4px 10px -3px rgba(249,115,22,.45); transform:translateY(-2px);}
  .nav-btn:active .nav-ic{transform:scale(.9);}
  .member-card{position:relative; border-radius:26px; padding:26px; overflow:hidden; background:linear-gradient(135deg,var(--secondary-light),var(--secondary) 65%); color:#fff; border-bottom:3px solid var(--primary);
    box-shadow:0 2px 0 rgba(255,255,255,.12) inset, 0 28px 50px -16px rgba(30,27,75,.55), 0 10px 20px -10px rgba(30,27,75,.4);
    transform-style:preserve-3d; will-change:transform; transition:transform .12s ease-out;}
  .member-card::before{content:''; position:absolute; inset:0; background:linear-gradient(120deg,rgba(255,255,255,.14),transparent 40%); pointer-events:none;}
  .member-card .orb{position:absolute; border-radius:50%; filter:blur(40px); opacity:.55;}
  .pill{padding:4px 11px; border-radius:20px; font-size:10.5px; font-weight:700; display:inline-flex; align-items:center; gap:5px;}
  .pill-green{background:rgba(16,185,129,.14); color:var(--success);}
  .pill-red{background:rgba(239,68,68,.12); color:var(--danger);}
  .pill-gray{background:#F1F5F9; color:var(--text-muted);}
  .progress-track{width:100%; height:10px; background:#EDF0F5; border-radius:999px; overflow:hidden; box-shadow:0 2px 4px rgba(15,23,42,.08) inset, 0 -1px 0 #fff inset;}
  .progress-fill{height:100%; background:linear-gradient(180deg,#F8CB74,var(--primary) 55%,var(--primary-hover)); border-radius:999px; transition:width .6s ease; box-shadow:0 1px 0 rgba(255,255,255,.4) inset;}
  .tab-btn{flex:1; text-align:center; padding:10px; border-radius:999px; font-weight:700; font-size:13px; border:none; background:none; color:var(--text-muted); transition:.15s;}
  .tab-btn.active{background:var(--secondary); color:#fff;}
  .empty-box{text-align:center; padding:40px 20px; color:var(--text-muted);}
  .empty-box img{width:120px; height:120px; object-fit:cover; border-radius:20px; margin:0 auto 16px; opacity:.85;}
  .pin-dot{width:16px; height:16px; border-radius:50%; border:2px solid var(--secondary); transition:.15s;}
  .badge-3d{ box-shadow:0 1px 0 rgba(255,255,255,.5) inset, 0 -3px 5px rgba(0,0,0,.12) inset, 0 6px 14px -5px rgba(15,23,42,.35); }
  .badge-3d-light{ box-shadow:0 1px 0 #fff inset, 0 -2px 4px rgba(15,23,42,.05) inset, 0 5px 12px -6px rgba(15,23,42,.18); }
  .pin-dot.filled{background:var(--primary); border-color:var(--primary);}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- BOOT -->
  <div id="screen-boot" style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;">
    <div style="width:56px; height:56px; border-radius:18px; background:var(--secondary); display:flex; align-items:center; justify-content:center;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F3A616" stroke-width="2.2"><path d="M3 21h18M5 21V9l7-5 7 5v12M9 21v-6h6v6"/></svg>
    </div>
    <div style="color:var(--text-muted); font-size:13px;" id="boot-msg">Memuat…</div>
  </div>

  <!-- LOGIN -->
  <div id="screen-login" class="hidden fade-in" style="min-height:100vh; display:flex; flex-direction:column;">
    <div style="position:relative; background:linear-gradient(160deg,#163666,#0A1D3C 70%); padding:56px 24px 64px; overflow:hidden; border-radius:0 0 36px 36px;">
      <div style="position:absolute; width:220px; height:220px; background:#F3A616; border-radius:50%; filter:blur(60px); opacity:.4; top:-80px; right:-60px;"></div>
      <div style="position:absolute; width:140px; height:140px; background:#163666; border-radius:50%; filter:blur(50px); opacity:.6; bottom:-50px; left:-40px;"></div>
      <div style="position:relative; text-align:center; color:#fff;">
        <div class="badge-3d" style="width:54px; height:54px; border-radius:16px; background:linear-gradient(160deg,rgba(255,255,255,.22),rgba(255,255,255,.08)); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; margin:0 auto 14px; border:1px solid rgba(255,255,255,.18);">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#F3A616" stroke-width="2.2"><path d="M3 21h18M5 21V9l7-5 7 5v12M9 21v-6h6v6"/></svg>
        </div>
        <div style="font-family:'Montserrat',sans-serif; font-weight:800; font-style:italic; font-size:27px; letter-spacing:-.5px; line-height:1;">PASTI <span style="color:#F3A616;">PUNYA</span></div>
        <p style="opacity:.7; font-size:12.5px; margin:14px 0 0;">Cek saldo & riwayat tabungan Anda kapan saja</p>
      </div>
    </div>
    <div class="shell" style="flex:1; margin-top:-38px; position:relative;">
      <div class="card" style="padding:26px;">
        <div style="display:flex; gap:6px; background:#F1F5F9; border-radius:999px; padding:4px; margin-bottom:20px;">
          <button type="button" class="tab-btn active" id="tab-first" onclick="setLoginMode('first')">Pertama Kali</button>
          <button type="button" class="tab-btn" id="tab-returning" onclick="setLoginMode('returning')">Sudah Punya Akun</button>
        </div>
        <form id="form-login">
          <label style="font-size:12.5px; font-weight:700; color:var(--text-muted);" id="li-label1">No. Rekening</label>
          <input class="field-input" id="li-norek" placeholder="Masukkan No. Rekening" inputmode="numeric" style="margin:8px 0 16px;">
          <label style="font-size:12.5px; font-weight:700; color:var(--text-muted);" id="li-label2">No. HP Terdaftar</label>
          <input class="field-input" id="li-pass" type="password" placeholder="Masukkan No. HP terdaftar" style="margin:8px 0 20px;">
          <button type="submit" class="btn-primary" style="width:100%;" id="btn-login"><span>Masuk</span></button>
        </form>
        <div id="login-err" style="color:var(--danger); font-size:12.5px; margin-top:12px; text-align:center;"></div>
      </div>
      <div style="text-align:center; font-size:11.5px; color:var(--text-muted); margin:20px 0;">Belum punya akses login? Hubungi staff agen Anda.</div>
    </div>
  </div>

  <!-- BUAT PIN (pertama kali) -->
  <div id="screen-setpin" class="hidden fade-in" style="min-height:100vh; display:flex; flex-direction:column;">
    <div style="position:relative; background:linear-gradient(160deg,#163666,#0A1D3C 70%); padding:56px 24px 64px; overflow:hidden; border-radius:0 0 36px 36px;">
      <div style="position:absolute; width:200px; height:200px; background:#F3A616; border-radius:50%; filter:blur(60px); opacity:.35; top:-70px; right:-50px;"></div>
      <div style="position:relative; text-align:center; color:#fff;">
        <div class="badge-3d" style="width:58px; height:58px; border-radius:18px; background:linear-gradient(160deg,rgba(255,255,255,.22),rgba(255,255,255,.08)); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; margin:0 auto 18px; border:1px solid rgba(255,255,255,.18);">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#F3A616" stroke-width="2.2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h1 style="font-size:20px; font-weight:800; margin:0;">Buat Akun Anda</h1>
        <p style="opacity:.75; font-size:13px; margin:6px 0 0;">Buat Username & Password sendiri untuk login berikutnya</p>
      </div>
    </div>
    <div class="shell" style="flex:1; margin-top:-38px;">
      <div class="card" style="padding:26px;">
        <form id="form-setpin">
          <label style="font-size:12.5px; font-weight:700; color:var(--text-muted);">Username Baru</label>
          <input class="field-input" id="sp-username" placeholder="Buat username" style="margin:8px 0 16px;">
          <label style="font-size:12.5px; font-weight:700; color:var(--text-muted);">Password Baru (minimal 6 karakter)</label>
          <input class="field-input" id="sp-pin1" type="password" placeholder="Buat password" style="margin:8px 0 16px;">
          <label style="font-size:12.5px; font-weight:700; color:var(--text-muted);">Ulangi Password</label>
          <input class="field-input" id="sp-pin2" type="password" placeholder="Ulangi password" style="margin:8px 0 18px;">
          <button type="submit" class="btn-primary" style="width:100%;" id="btn-setpin"><span>Simpan & Masuk</span></button>
        </form>
        <div id="setpin-err" style="color:var(--danger); font-size:12.5px; margin-top:12px; text-align:center;"></div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="screen-main" class="hidden">
    <header style="position:sticky; top:0; z-index:40; background:rgba(248,250,252,.85); backdrop-filter:blur(20px); padding:18px 24px 10px; display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div style="font-size:11.5px; color:var(--text-muted);">Halo,</div>
        <div style="font-weight:800; font-size:16px;" id="hdr-name">—</div>
      </div>
      <div class="badge-3d" style="width:42px; height:42px; border-radius:14px; overflow:hidden; background:linear-gradient(160deg,var(--secondary-light),var(--secondary)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:13px;" id="hdr-avatar">—</div>
    </header>

    <div id="page-home" class="shell fade-in"></div>
    <div id="page-riwayat" class="shell fade-in hidden"></div>
    <div id="page-program" class="shell fade-in hidden"></div>
    <div id="page-titipan" class="shell fade-in hidden"></div>
    <div id="page-profil" class="shell fade-in hidden"></div>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="home" onclick="switchTab('home')">
        <span class="nav-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
        Home</button>
      <button class="nav-btn" data-tab="riwayat" onclick="switchTab('riwayat')">
        <span class="nav-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/></svg></span>
        Riwayat</button>
      <button class="nav-btn" data-tab="program" onclick="switchTab('program')">
        <span class="nav-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></span>
        Program</button>
      <button class="nav-btn" data-tab="titipan" onclick="switchTab('titipan')">
        <span class="nav-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.91 8.84L8.56 21.19a4 4 0 0 1-5.65-5.65l9.19-9.19a2.5 2.5 0 0 1 3.54 3.54L7 18.36"/></svg></span>
        Titipan</button>
      <button class="nav-btn" data-tab="profil" onclick="switchTab('profil')">
        <span class="nav-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        Profil</button>
    </nav>
  </div>
</div>

<script>
/* ============================= FIREBASE ============================= */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBVD_JxRan2imOtcWCxc78_2zHvb1uY_UA",
  authDomain: "buku-tabungan-d91d3.firebaseapp.com",
  projectId: "buku-tabungan-d91d3",
  storageBucket: "buku-tabungan-d91d3.firebasestorage.app",
  messagingSenderId: "259351197970",
  appId: "1:259351197970:web:468eee581958e5f74f1bcb",
  measurementId: "G-KWC8F3N9Z9"
};
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();
const CUSTOMER_EMAIL_DOMAIN = '@nasabah.tabungan-app.local';
// TEMPEL VAPID KEY DARI: Firebase Console > Project Settings > Cloud Messaging
// > Web configuration > Web Push certificates > Generate key pair
const VAPID_KEY = "TEMPEL_VAPID_KEY_ANDA_DI_SINI";

function normalizeDigits(s){ return (s||'').replace(/\D/g,''); }
function normalizePhoneForAuth(hp){
  let d = normalizeDigits(hp);
  if(d.startsWith('0')) d = '62'+d.slice(1);
  if(!d.startsWith('62')) d = '62'+d;
  return d;
}
function norekToEmail(noRekening){ return normalizeDigits(noRekening) + CUSTOMER_EMAIL_DOMAIN; }
function rupiah(n){ n = Number(n)||0; return 'Rp ' + n.toLocaleString('id-ID'); }
function fmtDate(d){ const dt = new Date(d); return dt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(d){ const dt = new Date(d); return dt.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
function initials(name){ return (name||'?').split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase(); }

const STATE = { customerId:null, customer:null, transactions:[], goals:[], titipan:[], showBalance:true, tab:'home' };
let unsubCustomer=null, unsubTx=null, unsubGoals=null, unsubTitipan=null;

function showScreen(id){
  ['screen-boot','screen-login','screen-setpin','screen-main'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}

auth.onAuthStateChanged(async (user)=>{
  if(user){
    let prof;
    try{
      prof = await db.collection('customer_profiles').doc(user.uid).get();
    }catch(e){
      console.error('Gagal cek profil nasabah:', e);
      // Sesi ini bukan sesi nasabah yang valid (mis. bekas sesi staff yang
      // nyangkut di browser yang sama). Keluarkan HANYA kalau sesi itu
      // masih sama dengan yang sedang aktif sekarang (hindari menimpa
      // login baru yang mungkin sedang berlangsung bersamaan).
      if(auth.currentUser && auth.currentUser.uid === user.uid) await auth.signOut();
      showScreen('screen-login');
      return;
    }
    // Cek ulang: kalau di antara waktu baca profil ini user sudah ganti
    // (mis. sedang proses login baru), jangan timpa apapun, biarkan
    // pemanggilan onAuthStateChanged berikutnya yang menangani.
    if(!auth.currentUser || auth.currentUser.uid !== user.uid) return;
    if(!prof.exists){
      if(auth.currentUser.uid === user.uid) await auth.signOut();
      showScreen('screen-login');
      return;
    }
    const data = prof.data();
    if(!data.pinSet){ showScreen('screen-setpin'); return; }
    STATE.customerId = data.customerId;
    await enterApp();
  } else {
    showScreen('screen-login');
  }
});

/* ---------- LOGIN ---------- */
// Pertama kali: masukkan No. Rekening sebagai Username DAN Password (dua-duanya
// sama, No. Rekening). Setelah berhasil, wajib buat Username & Password sendiri.
// Berikutnya: login pakai Username & Password yang sudah dibuat sendiri itu.
let loginMode = 'first';
function setLoginMode(mode){
  loginMode = mode;
  document.getElementById('tab-first').classList.toggle('active', mode==='first');
  document.getElementById('tab-returning').classList.toggle('active', mode==='returning');
  document.getElementById('login-err').textContent = '';
  const norekEl = document.getElementById('li-norek');
  const passEl = document.getElementById('li-pass');
  if(mode==='first'){
    document.getElementById('li-label1').textContent = 'No. Rekening';
    norekEl.placeholder = 'Masukkan No. Rekening';
    norekEl.setAttribute('inputmode','numeric');
    document.getElementById('li-label2').textContent = 'No. HP Terdaftar';
    passEl.placeholder = 'Masukkan No. HP terdaftar';
  } else {
    document.getElementById('li-label1').textContent = 'Username';
    norekEl.placeholder = 'Masukkan Username';
    norekEl.removeAttribute('inputmode');
    document.getElementById('li-label2').textContent = 'Password';
    passEl.placeholder = 'Masukkan Password';
  }
}

document.getElementById('form-login').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const input1 = document.getElementById('li-norek').value.trim();
  const pass = document.getElementById('li-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent='';
  if(!input1 || !pass){ errEl.textContent = loginMode==='first' ? 'Isi No. Rekening dan No. HP terlebih dahulu.' : 'Isi Username dan Password terlebih dahulu.'; return; }
  const btn = document.getElementById('btn-login');
  btn.innerHTML = '<span class="spin"></span>'; btn.disabled = true;

  if(loginMode==='first'){
    // Tab "Pertama Kali": input1 = No. Rekening, pass = No. HP terdaftar
    const email = norekToEmail(input1);
    try{
      await auth.signInWithEmailAndPassword(email, pass);
      btn.innerHTML='<span>Masuk</span>'; btn.disabled=false;
      return;
    }catch(e1){
      // Cadangan: password awal mungkin masih No. Rekening itu sendiri (akun
      // yang dibuat sebelum sistem pakai No. HP), atau format No. HP berbeda.
      try{
        await auth.signInWithEmailAndPassword(email, normalizeDigits(input1));
        btn.innerHTML='<span>Masuk</span>'; btn.disabled=false;
        return;
      }catch(e1c){}
      try{
        const normalizedPhoneGuess = normalizePhoneForAuth(pass);
        await auth.signInWithEmailAndPassword(email, normalizedPhoneGuess);
        btn.innerHTML='<span>Masuk</span>'; btn.disabled=false;
        return;
      }catch(e1b){
        btn.innerHTML='<span>Masuk</span>'; btn.disabled=false;
        errEl.textContent='No. Rekening atau No. HP salah.';
        return;
      }
    }
  } else {
    // Tab "Sudah Punya Akun": input1 = Username custom, pass = Password custom
    try{
      const lookup = await db.collection('username_lookup').doc(input1.toLowerCase()).get();
      if(!lookup.exists) throw new Error('username tidak ditemukan');
      await auth.signInWithEmailAndPassword(lookup.data().email, pass);
      btn.innerHTML='<span>Masuk</span>'; btn.disabled=false;
      return;
    }catch(e2){
      btn.innerHTML='<span>Masuk</span>'; btn.disabled=false;
      errEl.textContent='Username atau Password salah.';
    }
  }
});

/* ---------- BUAT USERNAME & PASSWORD SENDIRI (aktivasi pertama kali) ---------- */
document.getElementById('form-setpin').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const usernameBaru = document.getElementById('sp-username').value.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'');
  const p1 = document.getElementById('sp-pin1').value;
  const p2 = document.getElementById('sp-pin2').value;
  const errEl = document.getElementById('setpin-err');
  errEl.textContent='';
  if(!usernameBaru){ errEl.textContent='Isi username terlebih dahulu.'; return; }
  if(p1.length<6){ errEl.textContent='Password minimal 6 karakter.'; return; }
  if(p1!==p2){ errEl.textContent='Password tidak sama, coba lagi.'; return; }
  const btn = document.getElementById('btn-setpin');
  btn.innerHTML='<span class="spin"></span>'; btn.disabled=true;
  try{
    const existing = await db.collection('username_lookup').doc(usernameBaru).get();
    if(existing.exists){ btn.innerHTML='<span>Simpan & Masuk</span>'; btn.disabled=false; errEl.textContent='Username sudah dipakai, coba username lain.'; return; }
    const myEmail = auth.currentUser.email;
    await auth.currentUser.updatePassword(p1);
    await db.collection('username_lookup').doc(usernameBaru).set({ email: myEmail });
    await db.collection('customer_profiles').doc(auth.currentUser.uid).update({ pinSet:true, username: usernameBaru });
    const prof = await db.collection('customer_profiles').doc(auth.currentUser.uid).get();
    STATE.customerId = prof.data().customerId;
    await enterApp();
  }catch(err){
    btn.innerHTML='<span>Simpan & Masuk</span>'; btn.disabled=false;
    if(err.code==='auth/requires-recent-login'){ errEl.textContent='Sesi login sudah lama, silakan login ulang lalu coba lagi.'; }
    else errEl.textContent = err.message;
  }
});

/* ---------- NOTIFIKASI ---------- */
function showToast(title, msg, icon){
  const id = 'toast-'+Date.now()+Math.random().toString(36).slice(2,6);
  const el = document.createElement('div');
  el.id = id;
  el.style.cssText = 'position:fixed; top:calc(env(safe-area-inset-top) + 14px); left:50%; transform:translateX(-50%) translateY(-20px); max-width:408px; width:calc(100% - 32px); background:#fff; border-radius:16px; padding:14px 16px; display:flex; gap:12px; align-items:flex-start; box-shadow:0 16px 40px rgba(15,23,42,.18); z-index:200; opacity:0; transition:transform .3s ease, opacity .3s ease;';
  el.innerHTML = `
    <div class="badge-3d-light" style="width:36px; height:36px; border-radius:11px; background:linear-gradient(160deg,#fff,#F1F5F9); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;">${icon||'🔔'}</div>
    <div style="flex:1; min-width:0;">
      <div style="font-weight:800; font-size:13px;">${title}</div>
      <div style="font-size:12px; color:var(--text-muted); margin-top:2px;">${msg}</div>
    </div>
    <button onclick="document.getElementById('${id}').remove()" style="background:none; border:none; color:var(--text-muted); font-size:16px; padding:0 2px; flex-shrink:0;">✕</button>
  `;
  document.body.appendChild(el);
  requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)'; });
  setTimeout(()=>{
    if(!document.getElementById(id)) return;
    el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(-20px)';
    setTimeout(()=>el.remove(), 300);
  }, 5000);
  // Notifikasi OS-level juga, kalau diizinkan & tab sedang tidak aktif dilihat
  if(document.hidden && 'Notification' in window && Notification.permission==='granted'){
    try{ new Notification(title, { body: msg, icon: 'icons/icon-192.png' }); }catch(e){}
  }
}
async function mintaIzinNotifikasi(){
  if(!('Notification' in window) || !('serviceWorker' in navigator)) return;
  try{
    if(Notification.permission==='default'){
      const hasil = await Notification.requestPermission();
      if(hasil!=='granted') return;
    }
    if(Notification.permission!=='granted') return;
    if(VAPID_KEY.includes('TEMPEL_VAPID_KEY')){ console.warn('VAPID_KEY belum diisi, notifikasi push tidak aktif.'); return; }

    const reg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
    const messaging = firebase.messaging();
    const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
    if(token && STATE.customerId){
      await db.collection('fcm_tokens').doc(token).set({ customerId: STATE.customerId, updatedAt: new Date().toISOString() });
    }
    // Notifikasi masuk selagi app SEDANG DIBUKA (foreground) — tampilkan toast custom kita
    messaging.onMessage(payload=>{
      const n = payload.notification || {};
      showToast(n.title||'Notifikasi', n.body||'', '🔔');
    });
  }catch(e){ console.error('Gagal mendaftar notifikasi:', e); }
}

/* ---------- MASUK APLIKASI (real-time listeners) ---------- */
async function enterApp(){
  showScreen('screen-main');
  if(unsubCustomer) unsubCustomer();
  if(unsubTx) unsubTx();
  if(unsubGoals) unsubGoals();
  if(unsubTitipan) unsubTitipan();
  mintaIzinNotifikasi();
  let firstLoadTx=true, firstLoadGoals=true, firstLoadTitipan=true;

  unsubCustomer = db.collection('customers').doc(STATE.customerId).onSnapshot(doc=>{
    if(!doc.exists) return;
    STATE.customer = { id:doc.id, ...doc.data() };
    document.getElementById('hdr-name').textContent = STATE.customer.nama.split(' ')[0];
    document.getElementById('hdr-avatar').textContent = initials(STATE.customer.nama);
    renderCurrentTab();
  });
  unsubTx = db.collection('transactions').where('customerId','==',STATE.customerId).onSnapshot(snap=>{
    if(!firstLoadTx){
      snap.docChanges().forEach(ch=>{
        if(ch.type==='added'){
          const t = ch.doc.data();
          const isSetor = t.type==='setor';
          showToast(isSetor?'Setoran Baru Masuk':'Penarikan Tercatat', `${isSetor?'+':'-'}${rupiah(t.amount)} — saldo Anda sudah diperbarui`, isSetor?'💰':'💸');
        }
      });
    }
    firstLoadTx=false;
    STATE.transactions = snap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>new Date(b.date)-new Date(a.date));
    renderCurrentTab();
  }, err=>console.error(err));
  unsubGoals = db.collection('goals').where('customerId','==',STATE.customerId).onSnapshot(snap=>{
    if(!firstLoadGoals){
      snap.docChanges().forEach(ch=>{
        if(ch.type==='added') showToast('Program Tabungan Baru', `"${ch.doc.data().namaBarang}" sudah aktif untuk Anda`, '🎯');
      });
    }
    firstLoadGoals=false;
    STATE.goals = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderCurrentTab();
  }, err=>console.error(err));
  unsubTitipan = db.collection('titipan').where('customerId','==',STATE.customerId).onSnapshot(snap=>{
    if(!firstLoadTitipan){
      snap.docChanges().forEach(ch=>{
        if(ch.type==='added') showToast('Titipan Barang Dicatat', `"${ch.doc.data().namaBarang}" sudah tercatat`, '📦');
      });
    }
    firstLoadTitipan=false;
    STATE.titipan = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderCurrentTab();
  }, err=>console.error(err));
}

function switchTab(tab){
  STATE.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  ['home','riwayat','program','titipan','profil'].forEach(t=>document.getElementById('page-'+t).classList.toggle('hidden', t!==tab));
  renderCurrentTab();
}

  else if(STATE.tab==='program') renderProgram();
  else if(STATE.tab==='titipan') renderTitipan();
  else if(STATE.tab==='profil') renderProfil();
}

/* ---------- Efek kartu 3D: miring mengikuti jari/mouse, kembali normal saat lepas ---------- */
function initCardTilt(){
  const card = document.querySelector('.member-card');
  if(!card) return;
  const MAX_TILT = 8;
  function applyTilt(clientX, clientY){
    const r = card.getBoundingClientRect();
    const px = (clientX - r.left) / r.width;   // 0..1
    const py = (clientY - r.top) / r.height;   // 0..1
    const rotY = (px - 0.5) * MAX_TILT * 2;
    const rotX = (0.5 - py) * MAX_TILT * 2;
    card.style.transform = `perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.015)`;
  }
  function resetTilt(){ card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)'; }
  card.addEventListener('pointermove', (e)=>{ if(e.pointerType==='mouse') applyTilt(e.clientX, e.clientY); });
  card.addEventListener('pointerleave', resetTilt);
  card.addEventListener('touchmove', (e)=>{ if(e.touches[0]) applyTilt(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
  card.addEventListener('touchend', resetTilt);
  card.addEventListener('touchcancel', resetTilt);
}

/* ---------- PROGRAM (Kantong) ---------- */
function goalScheme(price, months){
  months = Math.max(0.25, months);
  const totalDays = Math.max(1, Math.round(months*30));
  const totalWeeks = Math.max(1, Math.round(months*4.345));
  const totalMonths = Math.max(1, Math.round(months));
  const roundUp = v=>Math.ceil(v/500)*500;
  return { perHari:roundUp(price/totalDays), perMinggu:roundUp(price/totalWeeks), perBulan:roundUp(price/totalMonths) };
}
function renderProgram(){
  const goals = STATE.goals;
  document.getElementById('page-program').innerHTML = `
    <h2 style="font-size:19px; margin:14px 0 16px;">Program Tabungan</h2>
    ${goals.length ? goals.map(goalCard).join('') : emptyBox('empty_wallet','Belum ada program tabungan aktif. Hubungi staff agen untuk membuatkan program.')}
  `;
}
function goalCard(g){
  const pct = g.target>0 ? Math.min(100, Math.round((g.terkumpul/g.target)*100)) : 0;
  const isDone = g.status==='selesai';
  const s = goalScheme(g.target, g.tenorBulan);
  return `
  <div class="card" style="padding:20px; margin-bottom:14px; cursor:pointer;" onclick="openGoalHistory('${g.id}')">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <b style="font-size:14.5px;">${g.namaBarang}</b>
      <span class="pill ${isDone?'pill-green':'pill-gray'}">${isDone?'Tercapai':`${g.tenorBulan} bulan`}</span>
    </div>
    <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;">
      <span style="color:var(--text-muted);">Terkumpul</span>
      <b>${rupiah(g.terkumpul)} <span style="color:var(--text-muted); font-weight:500;">/ ${rupiah(g.target)}</span></b>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
    <div style="display:flex; justify-content:space-between; margin-top:8px;">
      <span style="color:${pct>=100?'var(--success)':'var(--primary)'}; font-weight:800; font-size:13px;">${pct}%</span>
      <span style="font-size:11.5px; color:var(--text-muted);">${isDone?'Program selesai 🎉':`Sisa ${rupiah(Math.max(0,g.target-g.terkumpul))}`}</span>
    </div>
    ${!isDone ? `
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:16px;">
      <div style="background:#F8FAFC; border-radius:12px; padding:10px; text-align:center;"><div style="font-size:10px; color:var(--text-muted);">Per Hari</div><b style="font-size:12px;">${rupiah(s.perHari)}</b></div>
      <div style="background:#FFF7ED; border-radius:12px; padding:10px; text-align:center;"><div style="font-size:10px; color:var(--primary);">Per Minggu</div><b style="font-size:12px; color:var(--primary);">${rupiah(s.perMinggu)}</b></div>
      <div style="background:#F8FAFC; border-radius:12px; padding:10px; text-align:center;"><div style="font-size:10px; color:var(--text-muted);">Per Bulan</div><b style="font-size:12px;">${rupiah(s.perBulan)}</b></div>
    </div>` : ''}
    <div style="text-align:center; margin-top:14px; font-size:11px; color:var(--primary); font-weight:700;">Lihat riwayat setoran →</div>
  </div>`;
}

    .filter(t=>t.goalId===goalId || (!t.goalId && t.keterangan===`Program: ${g.namaBarang}`))

}

/* ---------- TITIPAN BARANG (read-only) ---------- */
const TITIPAN_CATS = { perhiasan:'💍', elektronik:'📱', kendaraan:'🏍️', dokumen:'📄', lain:'📦' };
function titipanJatuhTempo(t){ const d = new Date(t.mulai); d.setDate(d.getDate()+t.tenorHari); return d; }
function titipanSisaHari(t){ return Math.ceil((titipanJatuhTempo(t) - new Date())/86400000); }
function titipanStatus(t){
  if(t.status==='ditebus') return {text:'Sudah Ditebus', cls:'pill-green'};
  if(t.status==='terjual') return {text:'Terjual/Lelang', cls:'pill-gray'};
  const sisa = titipanSisaHari(t);
  if(sisa<0) return {text:`Lewat tempo ${Math.abs(sisa)} hari`, cls:'pill-red'};
  if(sisa<=7) return {text:`Jatuh tempo ${sisa} hari lagi`, cls:'pill-red'};
  return {text:`Aktif — ${sisa} hari lagi`, cls:'pill-green'};
}
function renderTitipan(){
  const items = STATE.titipan;
  document.getElementById('page-titipan').innerHTML = `
    <h2 style="font-size:19px; margin:14px 0 6px;">Titipan Barang</h2>
    <p style="font-size:12px; color:var(--text-muted); margin:0 0 16px;">Dana talangan dengan jaminan barang — biaya jasa penitipan, bukan bunga</p>
    ${items.length ? items.map(titipanCardView).join('') : emptyBox('empty_wallet','Belum ada titipan barang tercatat')}
  `;
}
function titipanCardView(t){
  const st = titipanStatus(t);
  const isAktif = t.status==='aktif';
  return `
  <div class="card" style="padding:20px; margin-bottom:14px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="badge-3d-light" style="width:38px; height:38px; border-radius:12px; background:linear-gradient(160deg,#fff,#F1F5F9); display:flex; align-items:center; justify-content:center; font-size:17px;">${TITIPAN_CATS[t.kategori]||'📦'}</div>
        <b style="font-size:14px;">${t.namaBarang}</b>
      </div>
      <span class="pill ${st.cls}">${st.text}</span>
    </div>
    <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;"><span style="color:var(--text-muted);">Dana Talangan</span><b>${rupiah(t.pinjaman)}</b></div>
    <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;"><span style="color:var(--text-muted);">Total Biaya Jasa</span><b style="color:var(--primary);">${rupiah(t.totalJasa)}</b></div>
    <div style="display:flex; justify-content:space-between; font-size:12.5px;"><span style="color:var(--text-muted);">Total Jasa Terbayar</span><b style="color:var(--success);">${rupiah(t.totalJasaDibayar||0)}</b></div>
    ${isAktif ? `<div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--border); font-size:11.5px; color:var(--text-muted); text-align:center;">Mau bayar jasa atau tebus barang? Datang langsung ke agen.</div>` : ''}
  </div>`;
}

/* ---------- PROFIL ---------- */
function renderProfil(){
  const c = STATE.customer;
  document.getElementById('page-profil').innerHTML = `
    <h2 style="font-size:19px; margin:14px 0 16px;">Profil</h2>
    <div class="card" style="padding:22px; text-align:center; margin-bottom:16px;">
      <div class="badge-3d" style="width:66px; height:66px; border-radius:20px; background:linear-gradient(160deg,var(--secondary-light),var(--secondary)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:20px; margin:0 auto 12px;">${initials(c.nama)}</div>
      <div style="font-weight:800; font-size:16px;">${c.nama}</div>
      <div style="font-size:12px; color:var(--text-muted); margin-top:2px;">${c.noRekening} • Member ${c.noMember}</div>
    </div>
    <div class="card" style="padding:6px 4px; margin-bottom:16px;">
      ${profilRow('No. HP', c.hp)}
      ${profilRow('Alamat', c.alamat)}
      ${profilRow('Bergabung', fmtDate(c.tglDaftar))}
      ${profilRow('Status', c.status)}
    </div>
    <button class="btn-outline" style="width:100%; margin-bottom:10px;" onclick="openGantiPin()">Ganti Password</button>
    <button class="btn-outline" style="width:100%; color:var(--danger); border-color:#FEE2E2;" onclick="doLogout()">Keluar</button>
    <div id="pin-modal"></div>
  `;
}
function profilRow(label, val){
  return `<div style="display:flex; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border);"><span style="font-size:12.5px; color:var(--text-muted);">${label}</span><b style="font-size:13px; text-align:right; max-width:60%;">${val||'—'}</b></div>`;
}
function openGantiPin(){
  document.getElementById('pin-modal').innerHTML = `
  <div style="position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:100; display:flex; align-items:flex-end;" onclick="if(event.target===this) closeGantiPin()">
    <div class="card fade-in" style="width:100%; max-width:448px; margin:0 auto; border-radius:24px 24px 0 0; padding:24px;" onclick="event.stopPropagation()">
      <h3 style="margin:0 0 16px;">Ganti Password</h3>
      <form id="form-gantipin">
        <label style="font-size:12px; font-weight:700; color:var(--text-muted);">Password Lama</label>
        <input class="field-input" id="gp-old" type="password" style="margin:6px 0 12px;">
        <label style="font-size:12px; font-weight:700; color:var(--text-muted);">Password Baru (min. 6 karakter)</label>
        <input class="field-input" id="gp-new" type="password" style="margin:6px 0 12px;">
        <div id="gp-err" style="color:var(--danger); font-size:12px; margin-bottom:10px;"></div>
        <div style="display:flex; gap:10px;">
          <button type="button" class="btn-outline" style="flex:1;" onclick="closeGantiPin()">Batal</button>
          <button type="submit" class="btn-primary" style="flex:1;">Simpan</button>
        </div>
      </form>
    </div>
  </div>`;
  document.getElementById('form-gantipin').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const oldPin = document.getElementById('gp-old').value;
    const newPin = document.getElementById('gp-new').value;
    const errEl = document.getElementById('gp-err');
    if(newPin.length<6){ errEl.textContent='Password baru minimal 6 karakter.'; return; }
    try{
      const cred = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, oldPin);
      await auth.currentUser.reauthenticateWithCredential(cred);
      await auth.currentUser.updatePassword(newPin);
      closeGantiPin();
      alert('Password berhasil diganti.');
    }catch(err){ errEl.textContent = err.code==='auth/wrong-password' ? 'Password lama salah.' : err.message; }
  });
}
function closeGantiPin(){ document.getElementById('pin-modal').innerHTML=''; }
function doLogout(){
  if(!confirm('Keluar dari akun ini?')) return;
  if(unsubCustomer) unsubCustomer();
  if(unsubTx) unsubTx();
  if(unsubGoals) unsubGoals();
  if(unsubTitipan) unsubTitipan();
  auth.signOut();
}

function emptyBox(imgKey, text){
  const imgs = {
    empty_wallet: 'https://images.unsplash.com/photo-1624811532681-e58a7e25f273?crop=entropy&cs=srgb&fm=jpg&ixid=M3w3NTY2OTF8MHwxfHNlYXJjaHwyfHxlbXB0eSUyMHdhbGxldCUyMHNhdmluZ3N8ZW58MHx8fHwxNzg0MzU4NzA1fDA&ixlib=rb-4.1.0&q=85',
  };
  return `<div class="empty-box"><img src="${imgs[imgKey]}" alt=""><div>${text}</div></div>`;
}

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(err=>console.error('SW gagal:', err)); });
}
</script>
