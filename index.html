<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabungan Customer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#0B2447;
  --navy-2:#0F2F5C;
  --navy-3:#153E76;
  --accent:#2563A8;
  --accent-2:#3DA5D9;
  --white:#FFFFFF;
  --bg:#F1F4FA;
  --card:#FFFFFF;
  --border:#E4E9F1;
  --text:#182335;
  --muted:#6C7A8E;
  --green:#0F9D58;
  --green-bg:#E4F7EC;
  --red:#D64545;
  --red-bg:#FCEAEA;
  --gold:#C9A227;
  --gold-2:#E8D08A;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 2px 10px rgba(11,36,71,0.06);
  --shadow-lg:0 14px 34px rgba(11,36,71,0.16);
  --shadow-glow:0 0 0 4px rgba(37,99,168,0.1);
}
body.dark{
  --bg:#080E1A;
  --card:#101B2E;
  --border:#1E2C43;
  --text:#E8EDF5;
  --muted:#8A9AB3;
  --green-bg:#0E2A1C;
  --red-bg:#301418;
  --shadow:0 2px 10px rgba(0,0,0,0.35);
  --shadow-lg:0 16px 38px rgba(0,0,0,0.55);
  --shadow-glow:0 0 0 4px rgba(61,165,217,0.12);
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(900px 500px at 100% -10%, rgba(37,99,168,.05), transparent 60%),
    radial-gradient(700px 500px at -10% 110%, rgba(201,162,39,.05), transparent 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--text);
  transition:background-color .3s, color .3s;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'Space Mono',monospace;}
::-webkit-scrollbar{width:9px; height:9px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent);}
button{font-family:inherit; cursor:pointer; border:none; outline:none;}
input,select,textarea{font-family:inherit; outline:none;}
a{color:inherit; text-decoration:none;}
img{max-width:100%; display:block;}
@keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(20px,-24px) scale(1.06);}}
@keyframes shimmer{0%{background-position:-200% 0;} 100%{background-position:200% 0;}}

/* ---------- LOGIN ---------- */
#login-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(circle at 15% 15%, rgba(61,165,217,.35), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(201,162,39,.22), transparent 40%),
    radial-gradient(circle at 20% 20%, var(--navy-3), var(--navy) 60%);
  padding:20px; position:relative; overflow:hidden;
}
#login-screen::before, #login-screen::after{
  content:''; position:absolute; border-radius:50%; filter:blur(6px);
  background:radial-gradient(circle, rgba(255,255,255,.08), transparent 70%);
  animation:floatBlob 9s ease-in-out infinite;
}
#login-screen::before{width:340px; height:340px; top:-90px; left:-90px;}
#login-screen::after{width:420px; height:420px; bottom:-140px; right:-110px; animation-delay:2.5s;}
.login-card{
  background:var(--card); width:100%; max-width:380px; border-radius:22px;
  padding:42px 32px; box-shadow:0 30px 70px rgba(0,0,0,.35); text-align:center;
  animation:riseIn .55s cubic-bezier(.2,.9,.3,1); position:relative; z-index:1;
  border:1px solid rgba(255,255,255,.08);
}
@keyframes riseIn{from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);}}
.login-logo{
  width:64px; height:64px; border-radius:16px; background:linear-gradient(135deg,var(--navy),var(--accent-2));
  display:flex; align-items:center; justify-content:center; margin:0 auto 16px; color:#fff;
  box-shadow:0 10px 24px rgba(37,99,168,.35);
}
.login-card h1{font-size:20px; font-weight:700; color:var(--navy); letter-spacing:.2px;}
body.dark .login-card h1{color:#fff;}
.login-card p{color:var(--muted); font-size:13px; margin-top:4px; margin-bottom:26px;}
.field{text-align:left; margin-bottom:16px;}
.field label{font-size:12px; font-weight:600; color:var(--muted); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:.4px;}
.field input, .field select{
  width:100%; padding:12px 14px; border-radius:var(--radius-sm); border:1.5px solid var(--border);
  background:var(--bg); color:var(--text); font-size:14px; transition:border .2s, box-shadow .2s;
}
.field input:focus, .field select:focus{border-color:var(--accent); box-shadow:var(--shadow-glow);}
.btn{
  padding:12px 20px; border-radius:var(--radius-sm); font-weight:600; font-size:14px;
  transition:transform .15s, box-shadow .2s, background .2s, opacity .2s; display:inline-flex; align-items:center; gap:8px; justify-content:center;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--navy),var(--accent) 60%,var(--accent-2)); color:#fff; width:100%; box-shadow:0 8px 20px rgba(11,36,71,.28);}
.btn-primary:hover{box-shadow:0 10px 26px rgba(11,36,71,.4); transform:translateY(-1px);}
.btn-outline{background:transparent; border:1.5px solid var(--border); color:var(--text);}
.btn-outline:hover{border-color:var(--accent); color:var(--accent);}
.btn-green{background:linear-gradient(135deg,#0F9D58,#17BE6C); color:#fff;}
.btn-red{background:linear-gradient(135deg,#D64545,#E8635F); color:#fff;}
.btn-sm{padding:8px 14px; font-size:12.5px; border-radius:8px;}
.login-hint{font-size:11.5px; color:var(--muted); margin-top:18px; line-height:1.6; background:var(--bg); padding:10px 12px; border-radius:10px; border:1px solid var(--border);}

/* ---------- APP SHELL ---------- */
#app{display:none; min-height:100vh;}
#app.active{display:flex;}
.sidebar{
  width:246px; background:linear-gradient(180deg,var(--navy) 0%,var(--navy-2) 55%,var(--navy-3) 100%); flex-shrink:0;
  display:flex; flex-direction:column; padding:22px 16px; position:sticky; top:0; height:100vh; z-index:40;
  transition:transform .25s; box-shadow:4px 0 24px rgba(0,0,0,.12);
}
.brand{display:flex; align-items:center; gap:10px; padding:0 8px 24px; color:#fff;}
.brand-mark{width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,rgba(255,255,255,.2),rgba(255,255,255,.06)); display:flex; align-items:center; justify-content:center; box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);}
.brand-text b{display:block; font-size:14.5px; font-weight:700;}
.brand-text span{display:block; font-size:10px; color:var(--gold-2); letter-spacing:1px; font-weight:600;}
.nav-group{margin-top:6px;}
.nav-label{font-size:10px; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,.35); padding:14px 10px 6px;}
.nav-item{
  display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:10px; color:rgba(255,255,255,.72);
  font-size:13.5px; font-weight:500; margin-bottom:2px; transition:background .18s, color .18s, transform .15s; cursor:pointer; position:relative;
}
.nav-item svg{width:18px; height:18px; flex-shrink:0;}
.nav-item:hover{background:rgba(255,255,255,.08); color:#fff; transform:translateX(2px);}
.nav-item.active{background:linear-gradient(90deg,rgba(255,255,255,.16),rgba(255,255,255,.06)); color:#fff; box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);}
.nav-item.active::before{content:''; position:absolute; left:-16px; top:8px; bottom:8px; width:3px; background:linear-gradient(180deg,var(--gold-2),var(--gold)); border-radius:2px; box-shadow:0 0 8px rgba(201,162,39,.6);}
.sidebar-foot{margin-top:auto; padding-top:14px; border-top:1px solid rgba(255,255,255,.1);}
.user-chip{display:flex; align-items:center; gap:10px; padding:8px; border-radius:10px; color:#fff;}
.avatar{width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--gold-2),var(--gold)); color:var(--navy); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; box-shadow:0 3px 8px rgba(0,0,0,.25);}
.user-chip small{display:block; color:rgba(255,255,255,.5); font-size:10.5px;}
.user-chip b{font-size:12.5px;}

.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  height:68px; display:flex; align-items:center; justify-content:space-between; padding:0 26px;
  background:color-mix(in srgb, var(--card) 92%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:30; gap:16px;
}
.hamburger{display:none; background:transparent; color:var(--text); padding:6px;}
.searchbox{
  flex:1; max-width:420px; display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--border);
  border-radius:10px; padding:9px 14px; color:var(--muted); transition:border .2s, box-shadow .2s;
}
.searchbox:focus-within{border-color:var(--accent); box-shadow:var(--shadow-glow);}
.searchbox input{background:transparent; border:none; color:var(--text); font-size:13.5px; width:100%;}
.topbar-right{display:flex; align-items:center; gap:12px;}
.icon-btn{width:38px; height:38px; border-radius:10px; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--text); position:relative; border:1px solid var(--border); transition:border .18s, color .18s, transform .15s;}
.icon-btn:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-1px);}
.badge-dot{position:absolute; top:-3px; right:-3px; background:var(--red); color:#fff; font-size:9px; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; box-shadow:0 0 0 2px var(--card);}
.page{padding:24px 26px 60px; flex:1; animation:fadeUp .4s ease;}
.page-head{display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:22px;}
.page-head h2{font-size:22px; font-weight:700; letter-spacing:-.2px;}
.page-head p{color:var(--muted); font-size:13px; margin-top:3px;}

/* ---------- CARDS / GRID ---------- */
.grid-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:22px;}
.stat-card{
  background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); border:1px solid var(--border);
  transition:transform .22s cubic-bezier(.2,.9,.3,1), box-shadow .22s; position:relative; overflow:hidden;
}
.stat-card::after{content:''; position:absolute; inset:0; background:linear-gradient(135deg, rgba(37,99,168,.04), transparent 50%); pointer-events:none;}
.stat-card:hover{transform:translateY(-4px); box-shadow:var(--shadow-lg);}
.stat-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.stat-icon{width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center;}
.stat-card .val{font-size:23px; font-weight:700; letter-spacing:.2px;}
.stat-card .lbl{font-size:12.5px; color:var(--muted); margin-top:3px;}
.trend{font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px;}
.trend.up{background:var(--green-bg); color:var(--green);}
.trend.down{background:var(--red-bg); color:var(--red);}

.panel{background:var(--card); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); border:1px solid var(--border); animation:fadeUp .45s ease;}
.panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
.panel-head h3{font-size:15px; font-weight:700;}
.dash-grid{display:grid; grid-template-columns:1.6fr 1fr; gap:16px;}
.chart-wrap{height:220px; display:flex; align-items:flex-end; gap:10px; padding-top:10px;}
.bar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;}
.bar{width:100%; max-width:34px; border-radius:8px 8px 3px 3px; background:linear-gradient(180deg,var(--accent-2),var(--navy)); transition:height .6s cubic-bezier(.2,.9,.3,1), filter .2s; box-shadow:0 4px 10px rgba(37,99,168,.18);}
.bar:hover{filter:brightness(1.1);}
.bar-col span{font-size:10.5px; color:var(--muted);}
.mini-list{display:flex; flex-direction:column; gap:2px;}
.mini-row{display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--border); transition:background .15s; border-radius:8px;}
.mini-row:hover{background:var(--bg);}
.mini-row:last-child{border:none;}
.mini-row .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.mini-row .txt{flex:1; min-width:0;}
.mini-row .txt b{font-size:12.5px; display:block;}
.mini-row .txt span{font-size:11px; color:var(--muted);}

/* ---------- TABLE ---------- */
.table-wrap{overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border);}
table{width:100%; border-collapse:collapse; background:var(--card); font-size:13px; min-width:640px;}
thead th{
  text-align:left; padding:13px 16px; font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
  background:var(--bg); border-bottom:1px solid var(--border); white-space:nowrap; font-weight:700;
}
tbody td{padding:13px 16px; border-bottom:1px solid var(--border); vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .15s;}
tbody tr:hover{background:var(--bg);}
.pill{padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:5px;}
.pill.green{background:var(--green-bg); color:var(--green);}
.pill.red{background:var(--red-bg); color:var(--red);}
.pill.gray{background:var(--bg); color:var(--muted); border:1px solid var(--border);}
.row-cust{display:flex; align-items:center; gap:10px;}
.row-cust .thumb{width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--navy),var(--accent)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; overflow:hidden; flex-shrink:0;}
.row-cust .thumb img{width:100%; height:100%; object-fit:cover;}
.row-cust b{font-size:13px; display:block;}
.row-cust span{font-size:11px; color:var(--muted);}
.action-icons{display:flex; gap:6px;}
.action-icons button{width:30px; height:30px; border-radius:8px; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--muted); border:1px solid var(--border); transition:all .15s;}
.action-icons button:hover{color:var(--accent); border-color:var(--accent); transform:translateY(-1px);}
.toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
.select-sm{padding:9px 12px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:12.5px;}
.empty-state{text-align:center; padding:50px 20px; color:var(--muted);}
.empty-state svg{margin-bottom:12px; opacity:.5;}

/* ---------- MODAL ---------- */
.overlay{position:fixed; inset:0; background:rgba(6,12,24,.6); backdrop-filter:blur(3px); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; opacity:0; transition:opacity .2s;}
.overlay.active{display:flex; opacity:1;}
.modal{background:var(--card); border-radius:18px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto; box-shadow:0 30px 70px rgba(0,0,0,.4); animation:riseIn .25s cubic-bezier(.2,.9,.3,1); border:1px solid var(--border);}
.modal.wide{max-width:640px;}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:20px 22px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--card); z-index:2;}
.modal-head h3{font-size:16px; font-weight:700;}
.modal-close{width:32px; height:32px; border-radius:8px; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--muted); transition:all .15s;}
.modal-close:hover{background:var(--red-bg); color:var(--red);}
.modal-body{padding:22px;}
.modal-foot{padding:16px 22px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; position:sticky; bottom:0; background:var(--card);}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.amount-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:12px 0;}
.amount-chip{padding:9px; border-radius:8px; border:1px solid var(--border); background:var(--bg); font-size:12px; font-weight:600; text-align:center; color:var(--text); transition:all .15s;}
.amount-chip:hover{border-color:var(--accent); color:var(--accent); background:var(--card); transform:translateY(-1px);}
.amount-chip.active{border-color:var(--accent); color:#fff; background:var(--accent);}
.photo-upload{width:84px; height:84px; border-radius:14px; border:2px dashed var(--border); display:flex; align-items:center; justify-content:center; color:var(--muted); overflow:hidden; margin:0 auto 14px; cursor:pointer; background:var(--bg); position:relative; transition:border-color .2s, color .2s;}
.photo-upload:hover{border-color:var(--accent); color:var(--accent);}
.photo-upload img{width:100%; height:100%; object-fit:cover;}

/* ---------- TOAST ---------- */
#toast-wrap{position:fixed; top:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:10px;}
.toast{background:var(--card); border-left:4px solid var(--green); box-shadow:0 16px 34px rgba(0,0,0,.18); border-radius:10px; padding:13px 16px; min-width:260px; max-width:320px; animation:slideIn .3s cubic-bezier(.2,.9,.3,1); font-size:12.5px; display:flex; gap:10px; align-items:flex-start;}
.toast.err{border-color:var(--red);}
.toast b{display:block; font-size:13px; margin-bottom:2px;}
@keyframes slideIn{from{opacity:0; transform:translateX(30px);} to{opacity:1; transform:translateX(0);}}

/* ---------- PASSBOOK ---------- */
.passbook{
  background:linear-gradient(135deg,var(--navy),var(--navy-3) 60%, var(--accent)); border-radius:20px; padding:26px 26px 22px; color:#fff; position:relative; overflow:hidden;
  box-shadow:0 18px 40px rgba(11,36,71,.28);
}
.passbook::after{content:''; position:absolute; right:-40px; top:-40px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,.07);}
.passbook::before{content:''; position:absolute; left:-30px; bottom:-60px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,.05);}
.pb-row{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1;}
.pb-bal-lbl{font-size:11.5px; color:rgba(255,255,255,.6); letter-spacing:.4px; text-transform:uppercase;}
.pb-bal{font-size:30px; font-weight:700; margin-top:4px; letter-spacing:.3px;}
.pb-meta{display:flex; gap:26px; margin-top:20px; position:relative; z-index:1; flex-wrap:wrap;}
.pb-meta div span{display:block; font-size:10.5px; color:rgba(255,255,255,.55); text-transform:uppercase; letter-spacing:.4px;}
.pb-meta div b{font-size:13.5px;}
.pb-acct{font-family:'Space Mono',monospace; letter-spacing:1.5px; font-size:13px; color:rgba(255,255,255,.85);}

/* ---------- MEMBER CARD ---------- */
.member-card{
  width:100%; max-width:340px; aspect-ratio:1.586/1; border-radius:18px; padding:22px; color:#fff; position:relative; overflow:hidden;
  background:linear-gradient(135deg,#0B2447 0%, #153E76 55%, #2563A8 100%); box-shadow:0 20px 44px rgba(11,36,71,.35); margin:0 auto;
  border:1px solid rgba(255,255,255,.08);
}
.member-card::after{content:''; position:absolute; right:-50px; bottom:-60px; width:200px; height:200px; border-radius:50%; background:rgba(201,162,39,.15);}
.member-card::before{content:''; position:absolute; inset:0; background:linear-gradient(115deg, transparent 40%, rgba(255,255,255,.08) 50%, transparent 60%);}
.mc-top{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1;}
.mc-logo{font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase;}
.mc-logo span{color:var(--gold-2);}
.mc-chip{width:38px; height:28px; border-radius:6px; background:linear-gradient(135deg,#E8D08A,var(--gold)); margin-top:24px; box-shadow:0 3px 8px rgba(0,0,0,.25); position:relative; z-index:1;}
.mc-num{font-family:'Space Mono',monospace; font-size:16px; letter-spacing:2px; margin-top:18px; position:relative; z-index:1;}
.mc-bottom{display:flex; justify-content:space-between; align-items:flex-end; margin-top:16px; position:relative; z-index:1;}
.mc-name{font-size:13.5px; font-weight:600; text-transform:uppercase; letter-spacing:.5px;}
.mc-since{font-size:9.5px; color:rgba(255,255,255,.55); margin-top:2px;}
.mc-qr{background:#fff; padding:4px; border-radius:6px;}

/* ---------- MISC ---------- */
.tag-input{display:flex; gap:8px; align-items:center;}
.switch{width:42px; height:24px; border-radius:20px; background:var(--border); position:relative; transition:background .2s; flex-shrink:0;}
.switch.on{background:linear-gradient(135deg,var(--green),#17BE6C);}
.switch::after{content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; transition:transform .2s; box-shadow:0 2px 4px rgba(0,0,0,.2);}
.switch.on::after{transform:translateX(18px);}
.report-tabs{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
.rtab{padding:9px 16px; border-radius:10px; font-size:12.5px; font-weight:600; background:var(--card); border:1px solid var(--border); color:var(--muted); transition:all .15s;}
.rtab:hover{border-color:var(--accent); color:var(--accent);}
.rtab.active{background:linear-gradient(135deg,var(--navy),var(--accent)); color:#fff; border-color:transparent; box-shadow:0 6px 14px rgba(11,36,71,.25);}
.loading-spin{width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.center-loading{display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,var(--navy),var(--navy-3)); color:#fff; flex-direction:column; gap:14px; font-size:13px;}
.big-spin{width:36px; height:36px; border:3px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite;}

/* ---------- PROGRAM TABUNGAN (GOALS) ---------- */
.goal-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px;}
.goal-card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); transition:transform .2s, box-shadow .2s; position:relative; overflow:hidden;}
.goal-card:hover{transform:translateY(-3px); box-shadow:var(--shadow-lg);}
.goal-card.done{border-color:var(--green);}
.goal-card.done::after{content:'✓ TERCAPAI'; position:absolute; top:14px; right:-32px; background:var(--green); color:#fff; font-size:9px; font-weight:700; letter-spacing:1px; padding:4px 36px; transform:rotate(38deg);}
.goal-head{display:flex; align-items:flex-start; gap:12px; margin-bottom:14px;}
.goal-icon{width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px;}
.goal-icon.hp{background:rgba(37,99,168,.12); color:var(--accent);}
.goal-icon.tv{background:rgba(201,162,39,.14); color:var(--gold);}
.goal-icon.laptop{background:var(--green-bg); color:var(--green);}
.goal-icon.lain{background:var(--bg); color:var(--muted);}
.goal-head b{font-size:14.5px; display:block;}
.goal-head span{font-size:11.5px; color:var(--muted);}
.progress-track{height:10px; border-radius:20px; background:var(--bg); border:1px solid var(--border); overflow:hidden; margin:10px 0 8px;}
.progress-fill{height:100%; border-radius:20px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .6s cubic-bezier(.2,.9,.3,1); position:relative;}
.progress-fill.full{background:linear-gradient(90deg,var(--green),#17BE6C);}
.progress-fill::after{content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent); background-size:200% 100%; animation:shimmer 2.2s linear infinite;}
.goal-nums{display:flex; justify-content:space-between; font-size:12px; margin-bottom:12px;}
.goal-nums b{font-size:12.5px;}
.scheme-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;}
.scheme-box{background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 8px; text-align:center;}
.scheme-box small{display:block; font-size:9.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:700; margin-bottom:3px;}
.scheme-box b{font-size:12px; display:block;}
.scheme-box.hl{background:linear-gradient(135deg,rgba(37,99,168,.1),rgba(61,165,217,.08)); border-color:var(--accent);}
.scheme-box.hl b{color:var(--accent);}
.goal-foot{display:flex; gap:8px;}
.goal-foot .btn{flex:1;}
.sim-panel{background:linear-gradient(135deg,rgba(37,99,168,.06),rgba(201,162,39,.05)); border:1px dashed var(--accent); border-radius:12px; padding:14px; margin-top:4px;}
.sim-panel h4{font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--accent); margin-bottom:10px; display:flex; align-items:center; gap:6px;}
.sim-row{display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px dashed var(--border); font-size:13px;}
.sim-row:last-child{border:none;}
.sim-row span{color:var(--muted); font-size:12px;}
.sim-row b{font-size:14px;}
.sim-row.big b{font-size:16px; color:var(--accent);}
.cat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px;}
.cat-chip{padding:12px 6px; border-radius:12px; border:1.5px solid var(--border); background:var(--bg); text-align:center; cursor:pointer; transition:all .15s; font-size:11.5px; font-weight:600; color:var(--muted);}
.cat-chip div{font-size:20px; margin-bottom:4px;}
.cat-chip:hover{border-color:var(--accent);}
.cat-chip.active{border-color:var(--accent); background:rgba(37,99,168,.08); color:var(--accent); box-shadow:var(--shadow-glow);}

@media print{
  .no-print{display:none !important;}
  body{background:#fff;}
  .page{padding:0;}
}
@media(max-width:980px){
  .grid-stats{grid-template-columns:repeat(2,1fr);}

  .grid2{grid-template-columns:1fr;}
  .page{padding:16px;}
  .topbar{padding:0 14px;}
}
</style>
</head>

<script>
/* ============================= FIREBASE CONNECTION ============================= */
// Config ini SUDAH tersambung ke project Firebase "Buku tabungan" milik Anda.
// apiKey Firebase memang aman ditempel di kode publik (bukan rahasia seperti
// password) — keamanan data Anda dijaga oleh Firestore Security Rules, bukan
// oleh nilai-nilai di bawah ini. Karena sudah diisi, semua perangkat yang
// membuka file HTML ini akan otomatis tersambung tanpa perlu tempel apapun.
const DEFAULT_FIREBASE_CONFIG = {
  apiKey: "AIzaSyBVD_JxRan2imOtcWCxc78_2zHvb1uY_UA",
  authDomain: "buku-tabungan-d91d3.firebaseapp.com",
  projectId: "buku-tabungan-d91d3",
  storageBucket: "buku-tabungan-d91d3.firebasestorage.app",
  messagingSenderId: "259351197970",
  appId: "1:259351197970:web:468eee581958e5f74f1bcb",
  measurementId: "G-KWC8F3N9Z9"
};
let fbApp = null, auth = null, db = null;
function getFbConfig(){
  const raw = localStorage.getItem('fb_config');
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return DEFAULT_FIREBASE_CONFIG.apiKey ? DEFAULT_FIREBASE_CONFIG : null;
}
function saveFbConfig(cfg){ localStorage.setItem('fb_config', JSON.stringify(cfg)); }
function clearFbConfig(){ localStorage.removeItem('fb_config'); }
function parseFirebaseConfigText(text){
  // Menerima tempelan mentah dari Firebase Console, contoh:
  // const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", ... };
  const keys = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId','measurementId'];
  const cfg = {};
  keys.forEach(k=>{
    const re = new RegExp(k+'\\s*:\\s*["\']([^"\']+)["\']');
    const m = text.match(re);
    if(m) cfg[k] = m[1];
  });
  return (cfg.apiKey && cfg.projectId) ? cfg : null;
}
function initFbClient(){
  const cfg = getFbConfig();
  if(!cfg) return false;
  try{
    fbApp = firebase.initializeApp(cfg);
    auth = firebase.auth();
    db = firebase.firestore();
    return true;
  }catch(e){ console.error(e); return false; }
}

/* ---------- Firestore helpers (nama field sama persis dengan objek JS, tidak perlu mapping) ---------- */
async function fbLoadCollection(coll, orderField, dir){
  try{
    let ref = db.collection(coll);
    if(orderField) ref = ref.orderBy(orderField, dir||'asc');
    const snap = await ref.get();
    return snap.docs.map(d=>({ id:d.id, ...d.data() }));
  }catch(e){ console.error(coll, e); toast('Gagal memuat data', e.message, true); return []; }
}
async function fbSaveArray(coll, arr){
  if(!arr || !arr.length) return;
  try{
    const batch = db.batch();
    arr.forEach(o=>{ const {id, ...rest} = o; batch.set(db.collection(coll).doc(id), rest, {merge:true}); });
    await batch.commit();
  }catch(e){ console.error(coll, e); toast('Gagal menyimpan ke database', e.message, true); }
}
async function fbSaveOne(coll, obj){
  try{ const {id, ...rest} = obj; await db.collection(coll).doc(id).set(rest, {merge:true}); }
  catch(e){ console.error(coll, e); toast('Gagal menyimpan ke database', e.message, true); }
}
async function fbDeleteOne(coll, id){
  try{ await db.collection(coll).doc(id).delete(); }
  catch(e){ console.error(coll, e); toast('Gagal menghapus di database', e.message, true); }
}

/* ---------- Generic dbGet/dbSet used across the app (kept for minimal call-site changes) ---------- */
async function dbGet(key, fallback){
  try{
    if(key==='agent-settings'){
      const doc = await db.collection('agent_settings').doc('main').get();
      return doc.exists ? doc.data() : fallback;
    }
    if(key==='users') return null; // staff dikelola lewat Firebase Auth, lihat fbLoadProfiles()
    if(key==='customers') return await fbLoadCollection('customers', 'tglDaftar');
    if(key==='transactions') return await fbLoadCollection('transactions', 'date');
    if(key==='goals') return await fbLoadCollection('goals', 'mulai');
    if(key==='titipan') return await fbLoadCollection('titipan', 'mulai');
    if(key==='logs') return await fbLoadCollection('logs', 'time', 'desc');
    return fallback;
  }catch(e){ console.error(e); return fallback; }
}
async function dbSet(key, value){
  try{
    if(key==='agent-settings'){
      await db.collection('agent_settings').doc('main').set(value, {merge:true});
      return;
    }
    if(key==='users') return; // no-op, staff pakai fungsi Firebase Auth khusus
    if(key==='customers') return fbSaveArray('customers', value);
    if(key==='transactions') return fbSaveArray('transactions', value);
    if(key==='goals') return fbSaveArray('goals', value);
    if(key==='titipan') return fbSaveArray('titipan', value);
    if(key==='logs'){ if(value && value.length) return fbSaveOne('logs', value[0]); return; }
  }catch(e){ console.error(e); toast('Gagal menyimpan ke database', String(e), true); }
}

/* ============================= STATE ============================= */
let STATE = {
  settings: null,
  users: [],
  customers: [],
  transactions: [],
  logs: [],
  goals: [],
  titipan: [],
  currentUser: null,
  view: 'dashboard',
  darkMode: false,
  detailCustomerId: null,
  photoBuffer: null,
};

function uid(prefix){ return prefix + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,6).toUpperCase(); }
function rupiah(n){ n = Number(n)||0; return 'Rp ' + n.toLocaleString('id-ID'); }
/* ---- Format input uang otomatis (titik ribuan saat mengetik) ---- */
function formatMoneyInput(el){
  const neg = el.value.trim().startsWith('-');
  const raw = el.value.replace(/[^\d]/g,'');
  if(!raw){ el.value = neg ? '-' : ''; return; }
  el.value = (neg?'-':'') + Number(raw).toLocaleString('id-ID');
}
function setMoneyInput(id, v){
  const el = document.getElementById(id);
  if(!el) return;
  v = Number(v)||0;
  el.value = (v<0?'-':'') + Math.abs(v).toLocaleString('id-ID');
  el.dispatchEvent(new Event('input'));
}
function getMoneyInput(id){
  const el = document.getElementById(id);
  if(!el) return 0;
  const neg = el.value.trim().startsWith('-');
  const raw = el.value.replace(/[^\d]/g,'');
  const n = Number(raw)||0;
  return neg ? -n : n;
}
function fmtDate(d){ const dt = new Date(d); return dt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(d){ const dt = new Date(d); return dt.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
function todayKey(){ return new Date().toISOString().slice(0,10); }
function initials(name){ return (name||'?').split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase(); }

/* ============================= BOOTSTRAP / SEED ============================= */
const FAKE_EMAIL_DOMAIN = '@staff.tabungan-app.local';
function usernameToEmail(u){ return u.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'') + FAKE_EMAIL_DOMAIN; }

/* ---------- Login Nasabah: provisioning akun (dipakai app khusus nasabah) ---------- */
const CUSTOMER_EMAIL_DOMAIN = '@nasabah.tabungan-app.local';
function normalizeDigits(s){ return (s||'').replace(/\D/g,''); }
function normalizePhoneForAuth(hp){
  let d = normalizeDigits(hp);
  if(d.startsWith('0')) d = '62'+d.slice(1);
  if(!d.startsWith('62')) d = '62'+d;
  return d; // dipakai sebagai password sementara, min 6 digit (nomor HP selalu >6 digit)
}
function norekToEmail(noRekening){ return normalizeDigits(noRekening) + CUSTOMER_EMAIL_DOMAIN; }
async function provisionCustomerLogin(customerId){
  const c = STATE.customers.find(x=>x.id===customerId);
  if(!c) return;
  if(c.authProvisioned){ toast('Sudah aktif', 'Akun login nasabah ini sudah pernah diaktifkan sebelumnya.', true); return; }
  try{
    const secName = 'cust-create-'+Date.now();
    const secApp = firebase.initializeApp(getFbConfig(), secName);
    const secAuth = secApp.auth();
    const cred = await secAuth.createUserWithEmailAndPassword(norekToEmail(c.noRekening), normalizePhoneForAuth(c.hp));
    const newUid = cred.user.uid;
    await secAuth.signOut();
    await secApp.delete();
    await db.collection('customer_profiles').doc(newUid).set({ customerId: c.id, pinSet:false });
    c.authProvisioned = true;
    await dbSet('customers', [c]);
    addLog(`Akses login nasabah diaktifkan: ${c.nama} (${c.noRekening})`, 'info');
    toast('Login nasabah aktif', `${c.nama} sekarang bisa login di app Nasabah pakai No. Rekening + No. HP terdaftar, lalu buat PIN sendiri.`);
    return true;
  }catch(err){
    if(err.code==='auth/email-already-in-use'){
      // Sudah pernah dibuat sebelumnya (mis. dari percobaan lalu) tapi flag belum ke-set
      c.authProvisioned = true;
      await dbSet('customers', [c]);
      toast('Sudah aktif', 'Akun login nasabah ini ternyata sudah ada.', true);
    } else {
      toast('Gagal mengaktifkan login', err.message, true);
    }
    return false;
  }
}

async function boot(){
  document.getElementById('boot').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  if(sessionStorage.getItem('force_connect_screen')){ sessionStorage.removeItem('force_connect_screen'); renderConnectScreen(); return; }
  if(!initFbClient()){ renderConnectScreen(); return; }
  auth.onAuthStateChanged(async (user)=>{
    if(user){
      try{ await loadDataAndEnter(user); }
      catch(e){
        console.error('Sesi tidak valid untuk app staff:', e);
        await auth.signOut();
        await afterConnected();
      }
    }
    else{ await afterConnected(); }
  }, ()=>{ renderConnectScreen('Gagal memeriksa sesi login.'); });
}
boot();

async function afterConnected(){
  // meta/init adalah satu dokumen publik (boleh dibaca tanpa login) yang cuma
  // menyimpan status "sudah ada Admin atau belum" — dipakai untuk memutuskan
  // menampilkan layar Buat Admin atau layar Login biasa.
  try{
    const metaDoc = await db.collection('meta').doc('init').get();
    const bootstrapped = metaDoc.exists && metaDoc.data().bootstrapped;
    if(!bootstrapped){ renderBootstrapAdminScreen(); return; }
    renderLoginScreen();
  }catch(e){ renderConnectScreen('Koneksi gagal: '+e.message); }
}

function applyDarkMode(){

}

/* ---------- LAYAR: hubungkan database ---------- */
function renderConnectScreen(errMsg){
  document.getElementById('login-agent-name').textContent = 'Hubungkan Database';
  document.getElementById('login-subtitle').textContent = 'Sekali per perangkat — data akan tersimpan aman di Firebase';
  document.getElementById('login-card').querySelector('form').outerHTML = `
    <form id="connect-form">
      <div class="field"><label>Firebase Config</label><textarea id="fb-config-input" rows="7" style="width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; font-size:11.5px; resize:vertical;" placeholder='Tempel di sini, contoh:&#10;const firebaseConfig = {&#10;  apiKey: "...",&#10;  authDomain: "...",&#10;  projectId: "...",&#10;  ...&#10;};'></textarea></div>
      <button type="submit" class="btn btn-primary" id="connect-btn" style="margin-top:6px;"><span>Hubungkan</span></button>
    </form>`;
  document.getElementById('login-hint-box').innerHTML = (errMsg?`<b style="color:var(--red);">${errMsg}</b><br>`:'') + 'Ambil dari Firebase Console: Project Settings → General → scroll ke "Your apps" → SDK setup and configuration. Tempel apa adanya, aplikasi akan membaca nilainya otomatis.';
  document.getElementById('connect-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const text = document.getElementById('fb-config-input').value;
    const cfg = parseFirebaseConfigText(text);
    if(!cfg){ toast('Config tidak terbaca', 'Pastikan Anda menempel seluruh blok firebaseConfig.', true); return; }
    const btn = document.getElementById('connect-btn');
    btn.innerHTML = '<span class="loading-spin"></span> Menghubungkan…';
    saveFbConfig(cfg);
    if(!initFbClient()){ btn.innerHTML='<span>Hubungkan</span>'; toast('Gagal', 'Config tidak valid.', true); return; }
    await afterConnected();
  });
}

/* ---------- LAYAR: buat admin pertama (database masih kosong) ---------- */
function renderBootstrapAdminScreen(){
  document.getElementById('login-agent-name').textContent = 'Buat Akun Admin';
  document.getElementById('login-subtitle').textContent = 'Database masih kosong — buat akun Admin pertama';
  document.getElementById('login-card').querySelector('form').outerHTML = `
    <form id="bootstrap-form">
      <div class="field"><label>Nama Lengkap</label><input type="text" id="bs-name" placeholder="Nama Anda"></div>
      <div class="field"><label>Username</label><input type="text" id="bs-user" placeholder="admin"></div>
      <div class="field"><label>Password</label><input type="password" id="bs-pass" placeholder="Minimal 6 karakter"></div>
      <button type="submit" class="btn btn-primary" id="bootstrap-btn"><span>Buat Akun Admin</span></button>
    </form>`;
  document.getElementById('login-hint-box').innerHTML = 'Akun ini akan menjadi Admin pertama aplikasi. Pastikan Firestore Rules sudah ditempel (lihat firestore.rules) dan provider Email/Password sudah diaktifkan di Firebase Authentication.';
  document.getElementById('bootstrap-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const name = document.getElementById('bs-name').value.trim();
    const username = document.getElementById('bs-user').value.trim();
    const password = document.getElementById('bs-pass').value;
    if(!name || !username || !password){ toast('Data belum lengkap', 'Semua kolom wajib diisi.', true); return; }
    if(password.length<6){ toast('Password terlalu pendek', 'Minimal 6 karakter.', true); return; }
    const btn = document.getElementById('bootstrap-btn');
    btn.innerHTML = '<span class="loading-spin"></span> Membuat akun…';
    try{
      const cred = await auth.createUserWithEmailAndPassword(usernameToEmail(username), password);
      await db.collection('profiles').doc(cred.user.uid).set({ name, username: username.toLowerCase(), role:'Admin' });
      await db.collection('meta').doc('init').set({ bootstrapped:true });
      toast('Akun Admin dibuat', `Selamat datang, ${name}!`);
      await loadDataAndEnter(cred.user);
    }catch(err){
      btn.innerHTML='<span>Buat Akun Admin</span>';
      toast('Gagal membuat akun', err.message, true);
    }
  });
}

function renderLoginScreen(){
  document.getElementById('login-agent-name').textContent = STATE.settings ? STATE.settings.name : 'Tabungan Customer';
  document.getElementById('login-subtitle').textContent = 'Masuk untuk mengelola tabungan nasabah';
  document.getElementById('login-card').querySelector('form').outerHTML = `
    <form id="login-form">
      <div class="field"><label>Username</label><input type="text" id="login-user" placeholder="Masukkan username"></div>
      <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="Masukkan password"></div>
      <button type="submit" class="btn btn-primary" id="login-btn"><span>Masuk</span></button>
    </form>`;
  document.getElementById('login-hint-box').innerHTML = `Data tersimpan aman di database Firebase Anda sendiri. <a href="#" onclick="if(confirm('Sambungkan ke project Firebase lain?')){sessionStorage.setItem('force_connect_screen','1'); clearFbConfig(); location.reload();} return false;" style="color:var(--accent); font-weight:600;">Pakai database lain?</a>`;

async function doLogin(e){
  e.preventDefault();
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if(!u || !p){ toast('Data belum lengkap', 'Isi username dan password terlebih dahulu.', true); return; }
  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="loading-spin"></span> Memeriksa…';
  try{
    const cred = await auth.signInWithEmailAndPassword(usernameToEmail(u), p);
    const doc = await db.collection('profiles').doc(cred.user.uid).get();
    if(!doc.exists){
      await auth.signOut();
      btn.innerHTML = '<span>Masuk</span>';
      toast('Akun tidak aktif', 'Hubungi Admin untuk mengaktifkan kembali akun Anda.', true);
      return;
    }
    await loadDataAndEnter(cred.user, doc.data());
  }catch(err){
    btn.innerHTML = '<span>Masuk</span>';
    toast('Login gagal', 'Username atau password salah.', true);
  }
}

async function loadDataAndEnter(authUser, profileArg){
  document.getElementById('boot').style.display='flex';
  document.getElementById('login-screen').style.display='none';
  let profile = profileArg;
  if(!profile){
    const doc = await db.collection('profiles').doc(authUser.uid).get();
    if(!doc.exists){ await auth.signOut(); location.reload(); return; }
    profile = doc.data();
  }
  STATE.currentUser = { id: authUser.uid, name: profile.name, username: profile.username, role: profile.role };

  STATE.settings = await dbGet('agent-settings', null);
  if(!STATE.settings){
    STATE.settings = { name:'Agen BRILink Acik', address:'Jl. Merdeka No. 21, Medan', wa:'081234567890', logoText:'A', darkMode:false };
    await dbSet('agent-settings', STATE.settings);
  }
  STATE.users = await fbLoadProfiles();
  STATE.customers = await dbGet('customers', []);
  STATE.transactions = await dbGet('transactions', []);
  STATE.logs = await dbGet('logs', []);
  STATE.goals = await dbGet('goals', []);
  STATE.titipan = await dbGet('titipan', []);
  STATE.darkMode = STATE.settings.darkMode || false;
  applyDarkMode();

  document.getElementById('side-agent-name').textContent = STATE.settings.name;
  document.getElementById('boot').style.display='none';
  document.getElementById('app').classList.add('active');
  document.getElementById('side-avatar').textContent = initials(STATE.currentUser.name);
  document.getElementById('side-username').textContent = STATE.currentUser.name;
  document.getElementById('side-role').textContent = STATE.currentUser.role;
  document.querySelector('.nav-item[data-view="aktivitas"]').style.display = STATE.currentUser.role!=='Admin' ? 'none' : '';
  addLog(`${STATE.currentUser.name} berhasil login`, 'login');
  render('dashboard');
}

/* ============================= TOAST ============================= */
function toast(title, msg, isErr){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast' + (isErr?' err':'');
  el.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${isErr?'#D64545':'#0F9D58'}" stroke-width="2" style="flex-shrink:0; margin-top:1px;"><circle cx="12" cy="12" r="10"/>${isErr?'<line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>':'<polyline points="8 12 11 15 16 9"/>'}</svg><div><b>${title}</b>${msg}</div>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 3800);
}

function addLog(text, type){
  STATE.logs.unshift({ id: uid('L'), text, type: type||'info', user: STATE.currentUser? STATE.currentUser.name : 'Sistem', time: new Date().toISOString() });
  STATE.logs = STATE.logs.slice(0,300);
  dbSet('logs', STATE.logs);

/* ============================= DASHBOARD ============================= */
function viewDashboard(){
  const totalNasabah = STATE.customers.length;
  const totalSaldo = STATE.customers.reduce((a,c)=>a+c.saldo,0);
  const today = todayKey();
  const yesterday = (()=>{ const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
  const txToday = STATE.transactions.filter(t=>t.date.slice(0,10)===today);
  const txYesterday = STATE.transactions.filter(t=>t.date.slice(0,10)===yesterday);
  const setorToday = txToday.filter(t=>t.type==='setor').reduce((a,t)=>a+t.amount,0);
  const setorYesterday = txYesterday.filter(t=>t.type==='setor').reduce((a,t)=>a+t.amount,0);
  const tarikToday = txToday.filter(t=>t.type==='tarik').reduce((a,t)=>a+t.amount,0);
  const tarikYesterday = txYesterday.filter(t=>t.type==='tarik').reduce((a,t)=>a+t.amount,0);
  const nasabahBaru = STATE.customers.filter(c=>c.tglDaftar.slice(0,10)===today).length;
  const trendOf = (now, prev)=>{
    if(prev<=0 && now<=0) return null;
    if(prev<=0) return {up:true, txt:'Baru'};
    const pct = Math.round(((now-prev)/prev)*100);
    return {up: pct>=0, txt: (pct>=0?'+':'') + pct + '%'};
  };

  // 7 day chart
  const days = [...Array(7)].map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d; });
  const maxVal = Math.max(1, ...days.map(d=>{
    const key = d.toISOString().slice(0,10);
    return STATE.transactions.filter(t=>t.date.slice(0,10)===key).reduce((a,t)=>a+t.amount,0);
  }));
  const bars = days.map(d=>{
    const key = d.toISOString().slice(0,10);
    const val = STATE.transactions.filter(t=>t.date.slice(0,10)===key).reduce((a,t)=>a+t.amount,0);
    const h = Math.max(6, Math.round((val/maxVal)*160));
    return `<div class="bar-col"><b style="font-size:10px;color:var(--muted);">${val>0?(val/1000).toFixed(0)+'k':''}</b><div class="bar" style="height:${h}px"></div><span>${d.toLocaleDateString('id-ID',{weekday:'short'})}</span></div>`;
  }).join('');

  const recentTx = [...STATE.transactions].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  const recentRows = recentTx.length ? recentTx.map(t=>{
    const c = STATE.customers.find(x=>x.id===t.customerId);
    const isPos = t.type==='setor';
    return `<div class="mini-row"><div class="dot" style="background:${isPos?'var(--green)':'var(--red)'}"></div><div class="txt"><b>${c?c.nama:'—'}</b><span>${t.type==='setor'?'Setor Tunai':t.type==='tarik'?'Tarik Tunai':'Koreksi Saldo'} • ${fmtTime(t.date)}</span></div><b style="color:${isPos?'var(--green)':'var(--red)'}; font-size:12.5px;">${isPos?'+':'-'}${rupiah(t.amount)}</b></div>`;
  }).join('') : `<div class="empty-state" style="padding:20px;">Belum ada transaksi</div>`;

  return `
  <div class="page-head">
    <div><h2>Dashboard</h2><p>Ringkasan operasional hari ini — ${fmtDate(new Date())}</p></div>
    <button class="btn btn-primary btn-sm" onclick="render('transaksi')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Transaksi Baru</button>
  </div>
  <div class="grid-stats">
    ${statCard('Total Nasabah', totalNasabah, 'users', 'var(--navy)', 'rgba(11,36,71,.08)')}
    ${statCard('Total Saldo Nasabah', rupiah(totalSaldo), 'wallet', 'var(--green)', 'var(--green-bg)')}
    ${statCard('Setoran Hari Ini', rupiah(setorToday), 'arrow-down', 'var(--green)', 'var(--green-bg)', trendOf(setorToday, setorYesterday))}
    ${statCard('Penarikan Hari Ini', rupiah(tarikToday), 'arrow-up', 'var(--red)', 'var(--red-bg)', trendOf(tarikToday, tarikYesterday))}
  </div>
  <div class="grid-stats" style="grid-template-columns:repeat(2,1fr); margin-bottom:22px;">
    ${statCard('Transaksi Hari Ini', txToday.length, 'activity', 'var(--accent)', 'rgba(37,99,168,.1)')}
    ${statCard('Nasabah Baru Hari Ini', nasabahBaru, 'user-plus', 'var(--gold)', 'rgba(201,162,39,.12)')}
  </div>
  <div class="dash-grid">
    <div class="panel">
      <div class="panel-head"><h3>Grafik Transaksi 7 Hari Terakhir</h3><span class="pill gray">Nominal (Rp)</span></div>
      <div class="chart-wrap">${bars}</div>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Transaksi Terbaru</h3></div>
      <div class="mini-list">${recentRows}</div>
    </div>
  </div>
  ${(()=>{ const ag = STATE.goals.filter(g=>g.status==='aktif'); if(!ag.length) return '';
    return `<div class="panel" style="margin-top:16px;">
      <div class="panel-head"><h3>Program Tabungan Berjalan</h3><button class="btn btn-outline btn-sm" onclick="render('program')">Lihat Semua →</button></div>
      <div class="mini-list">${ag.slice(0,5).map(g=>{ const c=STATE.customers.find(x=>x.id===g.customerId); const pct=goalProgress(g);
        return `<div class="mini-row" style="cursor:pointer;" onclick="render('program')">
          <div style="font-size:18px;">${GOAL_CATS[g.kategori]?.emoji||'🎯'}</div>
          <div class="txt"><b>${g.namaBarang}</b><span>${c?c.nama:'—'} • ${rupiah(g.terkumpul)} / ${rupiah(g.target)}</span>
          <div class="progress-track" style="height:6px; margin:6px 0 0;"><div class="progress-fill ${pct>=100?'full':''}" style="width:${pct}%"></div></div></div>
          <b style="color:var(--accent); font-size:12.5px;">${pct}%</b>
        </div>`; }).join('')}</div>
    </div>`; })()}`;
}
function statCard(lbl,val,icon,color,bg,trend){
  const icons = {
    users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',
    wallet:'<path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4h-4z"/>',
    'arrow-down':'<line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>',
    'arrow-up':'<line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>',
    activity:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
    'user-plus':'<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="17" y1="11" x2="23" y2="11"/>'
  };
  const trendHtml = trend ? `<span class="trend ${trend.up?'up':'down'}">${trend.up?'▲':'▼'} ${trend.txt}</span>` : '';
  return `<div class="stat-card"><div class="stat-top"><div class="stat-icon" style="background:${bg}; color:${color};"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${icons[icon]}</svg></div>${trendHtml}</div><div class="val">${val}</div><div class="lbl">${lbl}</div></div>`;
}

function filterNasabah(){
  const q = (document.getElementById('nasabah-search').value||'').toLowerCase();
  const status = document.getElementById('nasabah-filter-status').value;
  const filtered = STATE.customers.filter(c=>{
    const matchQ = !q || c.nama.toLowerCase().includes(q) || c.hp.includes(q) || c.noRekening.toLowerCase().includes(q) || (c.rfid||'').toLowerCase().includes(q) || c.noMember.toLowerCase().includes(q);
    const matchS = !status || c.status===status;
    return matchQ && matchS;
  });
  document.getElementById('nasabah-tbody').innerHTML = nasabahRows(filtered);
}

function exportCSV(customerId){
  const c = STATE.customers.find(x=>x.id===customerId);

  txs.forEach(t=>{
    csv += `${fmtDate(t.date)},${fmtTime(t.date)},${t.type},${t.type==='tarik'?t.amount:0},${t.type==='setor'?t.amount:0},${t.saldoSesudah},"${t.keterangan}"\n`;
  });
  downloadFile(`mutasi-${c.noRekening}.csv`, csv);
  addLog(`Export mutasi ${c.nama} ke Excel/CSV`, 'info');
}
function downloadFile(filename, content){
  const blob = new Blob([content], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
}

  const options = STATE.customers.map(c=>`<option value="${c.id}" ${presetId===c.id?'selected':''}>${c.nama} — ${c.noRekening} (${rupiah(c.saldo)})</option>`).join('');

      <div class="field"><label>Nominal (Rp)*</label><input id="tx-amount" type="text" inputmode="numeric" placeholder="0" style="font-size:18px; font-weight:700;" oninput="formatMoneyInput(this)"></div>
      <div class="amount-grid">
        ${[50000,100000,200000,500000,1000000,2000000].map(v=>`<button type="button" class="amount-chip" onclick="setMoneyInput('tx-amount',${v})">${(v/1000)}k</button>`).join('')}
      </div>
      <div class="field"><label>Keterangan</label><input id="tx-note" placeholder="${type==='koreksi'?'Alasan koreksi saldo':'Opsional'}"></div>
      <div class="login-hint">Cabang: <b>${STATE.settings.name}</b> • Staff: <b>${STATE.currentUser.name}</b> • ${fmtDate(new Date())} ${fmtTime(new Date())}</div>
    </div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn ${type==='tarik'?'btn-red':'btn-green'}" onclick="confirmTx('${type}')">Konfirmasi ${titleMap[type]}</button></div>
  `);
}
async function confirmTx(type){
  const cid = document.getElementById('tx-customer').value;
  const amount = getMoneyInput('tx-amount');
  const note = document.getElementById('tx-note').value.trim();
  const c = STATE.customers.find(x=>x.id===cid);
  if(!amount || amount<=0){ toast('Nominal tidak valid', 'Masukkan nominal lebih dari 0.', true); return; }
  if(type==='tarik' && amount>c.saldo){ toast('Saldo tidak cukup', `Saldo ${c.nama} hanya ${rupiah(c.saldo)}.`, true); return; }
  const tx = await logTransaction(c, type, amount, note || (type==='setor'?'Setor tunai':type==='tarik'?'Tarik tunai':'Koreksi saldo'));
  closeModal();
  render(STATE.view==='detail-nasabah'?'detail-nasabah':'transaksi');
  const typeLabel = type==='setor'?'Setoran':type==='tarik'?'Penarikan':'Koreksi';
  openModal(`
    <div class="modal-head"><h3>✅ Transaksi Berhasil</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="sim-row big" style="margin-bottom:14px;"><div><b>${rupiah(amount)}</b><br><span>${typeLabel} — ${c.nama}</span></div></div>
      <div class="sim-row"><span>Saldo Sekarang</span><b>${rupiah(c.saldo)}</b></div>
      <div class="sim-row"><span>No. Transaksi</span><b class="mono" style="font-size:12px;">${tx.id}</b></div>
    </div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Tutup</button><button class="btn btn-primary" onclick="printReceipt('${tx.id}')">🖨️ Cetak Struk</button></div>
  `);
}
async function logTransaction(c, type, amount, note){
  const before = c.saldo;
  if(type==='setor'){ c.saldo += amount; c.totalSetor += amount; }
  else if(type==='tarik'){ c.saldo -= amount; c.totalTarik += amount; }
  else { c.saldo += amount; } // koreksi bisa +/- (nilai amount bisa negatif jika diinput minus)
  const tx = {
    id: uid('TX'), customerId: c.id, type, amount: Math.abs(amount),
    date: new Date().toISOString(), staff: STATE.currentUser.name, cabang: STATE.settings.name,
    saldoSebelum: before, saldoSesudah: c.saldo, keterangan: note,
  };
  STATE.transactions.push(tx);
  await dbSet('customers', STATE.customers);
  await dbSet('transactions', STATE.transactions);
  addLog(`${type==='setor'?'Setor':type==='tarik'?'Tarik':'Koreksi'} ${rupiah(amount)} — ${c.nama} (${tx.id})`, type);
  return tx;
}

  <body>

/* ============================= PROGRAM TABUNGAN (GOALS) ============================= */
const GOAL_CATS = {
  hp:     { label:'Handphone', emoji:'📱' },
  tv:     { label:'Televisi',  emoji:'📺' },
  laptop: { label:'Laptop',    emoji:'💻' },
  lain:   { label:'Lainnya',   emoji:'🎯' },
};
function goalScheme(price, months){
  // Skema pembulatan ke atas kelipatan 500 agar mudah disetor tunai
  months = Math.max(0.25, months);
  const totalDays = Math.max(1, Math.round(months * 30));
  const totalWeeks = Math.max(1, Math.round(months * 4.345));
  const totalMonths = Math.max(1, Math.round(months));
  const roundUp = (v)=> Math.ceil(v/500)*500;
  return {
    perHari:  roundUp(price/totalDays),
    perMinggu:roundUp(price/totalWeeks),
    perBulan: roundUp(price/totalMonths),
    totalDays, totalWeeks, months: totalMonths
  };
}
function goalProgress(g){
  const pct = g.target>0 ? Math.min(100, Math.round((g.terkumpul/g.target)*100)) : 0;
  return pct;
}
function goalDeadline(g){
  const d = new Date(g.mulai);
  d.setMonth(d.getMonth() + g.tenorBulan);
  return d;
}
function goalSisaHari(g){
  const diff = goalDeadline(g) - new Date();
  return Math.max(0, Math.ceil(diff/86400000));
}

  const active = STATE.goals.filter(g=>g.status==='aktif');

      <button class="btn btn-primary btn-sm" onclick="openAddGoal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Buat Program Baru</button>
    </div>

  <div class="grid-stats" style="grid-template-columns:repeat(4,1fr);">
    ${statCard('Program Aktif', active.length, 'activity', 'var(--accent)', 'rgba(37,99,168,.1)')}
    ${statCard('Program Tercapai', done.length, 'users', 'var(--green)', 'var(--green-bg)')}
    ${statCard('Total Target Aktif', rupiah(totalTarget), 'wallet', 'var(--gold)', 'rgba(201,162,39,.12)')}
    ${statCard('Total Terkumpul', rupiah(totalTerkumpul), 'arrow-down', 'var(--green)', 'var(--green-bg)')}
  </div>
  ${STATE.goals.length ? `<div class="goal-grid">${[...STATE.goals].sort((a,b)=> (a.status==='aktif'?-1:1) - (b.status==='aktif'?-1:1) || new Date(b.mulai)-new Date(a.mulai)).map(goalCard).join('')}</div>`

      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>

      <div style="font-size:12px; max-width:380px; margin:0 auto 16px;">Buat program untuk nasabah yang ingin menabung dengan target barang tertentu. Sistem akan menghitung otomatis setoran per hari, per minggu, dan per bulan.</div>

function goalCard(g){
  const c = STATE.customers.find(x=>x.id===g.customerId);
  const cat = GOAL_CATS[g.kategori] || GOAL_CATS.lain;
  const pct = goalProgress(g);
  const s = goalScheme(g.target, g.tenorBulan);
  const sisa = Math.max(0, g.target - g.terkumpul);
  const sisaHari = goalSisaHari(g);
  const isDone = g.status==='selesai';
  return `
  <div class="goal-card ${isDone?'done':''}">
    <div class="goal-head">
      <div class="goal-icon ${g.kategori}">${cat.emoji}</div>
      <div style="flex:1; min-width:0;">

    </div>
    <div class="goal-nums"><span style="color:var(--muted);">Terkumpul</span><b>${rupiah(g.terkumpul)} <span style="color:var(--muted); font-weight:500;">/ ${rupiah(g.target)}</span></b></div>
    <div class="progress-track"><div class="progress-fill ${pct>=100?'full':''}" style="width:${pct}%"></div></div>
    <div class="goal-nums" style="margin-bottom:14px;"><span style="color:${pct>=100?'var(--green)':'var(--accent)'}; font-weight:700;">${pct}%</span><span style="color:var(--muted);">${isDone?'Program selesai 🎉':`Sisa ${rupiah(sisa)} • ±${sisaHari} hari lagi`}</span></div>
    <div class="scheme-grid">
      <div class="scheme-box"><small>Per Hari</small><b>${rupiah(s.perHari)}</b></div>
      <div class="scheme-box hl"><small>Per Minggu</small><b>${rupiah(s.perMinggu)}</b></div>
      <div class="scheme-box"><small>Per Bulan</small><b>${rupiah(s.perBulan)}</b></div>
    </div>
    <div class="goal-foot">
      ${isDone
        ? `<button class="btn btn-outline btn-sm" onclick="deleteGoal('${g.id}')">Hapus Riwayat</button>`
        : `<button class="btn btn-green btn-sm" onclick="openSetorGoal('${g.id}')">+ Setor Program</button>
           <button class="btn btn-outline btn-sm" onclick="openDetailGoal('${g.id}')">Rincian</button>`}
    </div>
  </div>`;
}

function pickGoalCat(k){
  goalCatBuffer = k;
  document.querySelectorAll('#g-cats .cat-chip').forEach(el=>el.classList.toggle('active', el.dataset.cat===k));
  const nameInput = document.getElementById('g-nama');
  if(!nameInput.value.trim() && k!=='lain') nameInput.placeholder = `Contoh: ${GOAL_CATS[k].label} impian nasabah`;
}
function renderGoalSim(){
  const harga = getMoneyInput('g-harga');
  const tenor = Number(document.getElementById('g-tenor').value)||6;
  const awal = getMoneyInput('g-awal');
  const sisa = Math.max(0, harga - awal);
  let html = schemeHTML(sisa, tenor, awal>0 ? `Skema Setoran (setelah setoran awal ${rupiah(awal)})` : 'Skema Setoran Otomatis');
  document.getElementById('g-sim').innerHTML = html;
}
async function saveGoal(){
  const customerId = document.getElementById('g-customer').value;
  const namaBarang = document.getElementById('g-nama').value.trim();
  const target = getMoneyInput('g-harga');
  const tenorBulan = Number(document.getElementById('g-tenor').value)||6;
  const awal = getMoneyInput('g-awal');
  const c = STATE.customers.find(x=>x.id===customerId);
  if(!c){ toast('Nasabah tidak valid', 'Pilih nasabah terlebih dahulu.', true); return; }
  if(!namaBarang){ toast('Data belum lengkap', 'Isi nama barang yang ingin dibeli.', true); return; }
  if(target<=0){ toast('Harga tidak valid', 'Masukkan harga barang lebih dari 0.', true); return; }
  if(awal>target){ toast('Setoran awal terlalu besar', 'Setoran awal tidak boleh melebihi harga barang.', true); return; }
  const g = {
    id: uid('G'), customerId, kategori: goalCatBuffer, namaBarang,
    target, tenorBulan, terkumpul: 0,
    mulai: new Date().toISOString(), status:'aktif',
  };
  STATE.goals.push(g);
  await dbSet('goals', STATE.goals);
  if(awal>0){
    await setorKeGoal(g, awal);
  }
  addLog(`Program tabungan dibuat: ${namaBarang} (${rupiah(target)}, ${tenorBulan} bln) — ${c.nama}`, 'baru');
  toast('Program dibuat', `Program "${namaBarang}" untuk ${c.nama} aktif. Skema setoran sudah dihitung otomatis.`);
  closeModal();
  render('program');
}

  const g = STATE.goals.find(x=>x.id===goalId);

  const c = STATE.customers.find(x=>x.id===g.customerId);
  const s = goalScheme(g.target, g.tenorBulan);
  const sisa = Math.max(0, g.target - g.terkumpul);
  openModal(`

      </div>
      <div class="field"><label>Nominal Setoran (Rp)*</label><input id="gs-amount" type="text" inputmode="numeric" placeholder="0" style="font-size:18px; font-weight:700;" oninput="formatMoneyInput(this)"></div>

        <button type="button" class="amount-chip" onclick="setMoneyInput('gs-amount',${s.perBulan})">Bulanan<br><b>${rupiah(s.perBulan)}</b></button>
      </div>
      <div class="amount-grid" style="grid-template-columns:1fr;">
        <button type="button" class="amount-chip" onclick="setMoneyInput('gs-amount',${sisa})">Lunasi Sisa — <b>${rupiah(sisa)}</b></button>
      </div>
      <div class="login-hint">Setoran ini otomatis tercatat sebagai <b>Setor Tunai</b> di rekening nasabah dan menambah progres program.</div>
    </div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-green" onclick="confirmSetorGoal('${g.id}')">Konfirmasi Setoran</button></div>
  `);
}
async function confirmSetorGoal(goalId){
  const g = STATE.goals.find(x=>x.id===goalId);
  if(!g) return;
  const c = STATE.customers.find(x=>x.id===g.customerId);
  const amount = getMoneyInput('gs-amount');
  if(amount<=0){ toast('Nominal tidak valid', 'Masukkan nominal lebih dari 0.', true); return; }
  await setorKeGoal(g, amount);
  const done = g.status==='selesai';
  toast(done?'Target tercapai! 🎉':'Setoran berhasil', done
    ? `Program "${g.namaBarang}" milik ${c?c.nama:''} sudah mencapai target ${rupiah(g.target)}.`
    : `${rupiah(amount)} masuk ke program "${g.namaBarang}".`);
  closeModal();
  render('program');
}
async function setorKeGoal(g, amount){
  const c = STATE.customers.find(x=>x.id===g.customerId);
  if(!c) return;
  await logTransaction(c, 'setor', amount, `Program: ${g.namaBarang}`);
  g.terkumpul += amount;
  if(g.terkumpul >= g.target && g.status!=='selesai'){
    g.status = 'selesai';
    g.selesaiPada = new Date().toISOString();
    addLog(`Program tabungan TERCAPAI: ${g.namaBarang} — ${c.nama} (${rupiah(g.target)})`, 'baru');
  }
  await dbSet('goals', STATE.goals);
}

async function deleteGoal(goalId){
  const g = STATE.goals.find(x=>x.id===goalId);
  if(!g) return;
  const c = STATE.customers.find(x=>x.id===g.customerId);
  if(!confirm(`Hapus program "${g.namaBarang}"?\n\nCatatan: saldo & transaksi setoran nasabah TIDAK ikut terhapus — hanya program targetnya saja.`)) return;

/* ============================= TITIPAN BARANG (Rahn Syariah — tanpa bunga) ============================= */
// Konsep: nasabah menitipkan barang berharga sebagai jaminan, agen memberi
// dana talangan (pinjaman). Bukan bunga — nasabah membayar BIAYA JASA
// PENITIPAN (ijarah) untuk keamanan & penyimpanan barangnya, dihitung dari
// nilai taksiran barang, bukan dari besar pinjaman. Kalau lewat jatuh tempo
// dan tidak ditebus/diperpanjang, barang boleh dijual (lelang) untuk
// menutup dana talangan — sisa hasil jual jadi hak nasabah.
const TITIPAN_CATS = {
  perhiasan:  { label:'Perhiasan',       emoji:'💍' },
  elektronik: { label:'Elektronik',      emoji:'📱' },
  kendaraan:  { label:'BPKB Kendaraan',  emoji:'🏍️' },
  dokumen:    { label:'Dokumen/Sertifikat', emoji:'📄' },
  lain:       { label:'Lainnya',         emoji:'📦' },
};
function titipanJatuhTempo(t){
  const d = new Date(t.mulai);
  d.setMonth(d.getMonth() + t.tenorBulan);
  return d;
}
function titipanSisaHari(t){
  const diff = titipanJatuhTempo(t) - new Date();
  return Math.ceil(diff/86400000);
}
function titipanStatusLabel(t){
  if(t.status==='ditebus') return {text:'Sudah Ditebus', cls:'green'};
  if(t.status==='terjual') return {text:'Terjual/Lelang', cls:'gray'};
  const sisa = titipanSisaHari(t);
  if(sisa<0) return {text:`Lewat Jatuh Tempo ${Math.abs(sisa)} hari`, cls:'red'};
  if(sisa<=7) return {text:`Jatuh Tempo ${sisa} hari lagi`, cls:'red'};
  return {text:`Aktif — ${sisa} hari lagi`, cls:'green'};
}

    ${statCard('Total Jasa Terkumpul', rupiah(totalJasa), 'arrow-down', 'var(--green)', 'var(--green-bg)')}

  <div class="login-hint" style="margin-bottom:18px;">Skema syariah: biaya jasa dihitung dari <b>nilai taksiran barang</b> per bulan (ijarah/biaya simpan-jaga), bukan bunga dari pinjaman. Total taksiran barang aktif saat ini: <b>${rupiah(totalTaksiran)}</b>.</div>
  ${STATE.titipan.length ? `<div class="goal-grid">${[...STATE.titipan].sort((a,b)=> (a.status==='aktif'?-1:1) - (b.status==='aktif'?-1:1) || new Date(b.mulai)-new Date(a.mulai)).map(titipanCard).join('')}</div>`

function hitungSaranTitipan(){
  const taksiran = getMoneyInput('tt-taksiran');
  const el = document.getElementById('tt-saran');
  if(!el) return;
  if(!taksiran){ el.innerHTML = 'Saran: dana talangan maksimal ±80% dari taksiran, biaya jasa ±1,75% dari taksiran per bulan.'; return; }
  const saranPinjaman = Math.round(taksiran*0.8/1000)*1000;
  const saranJasa = Math.round(taksiran*0.0175/500)*500;
  el.innerHTML = `Saran (bisa disesuaikan): dana talangan maks <b>${rupiah(saranPinjaman)}</b> (80%), biaya jasa <b>${rupiah(saranJasa)}</b>/bulan (1,75%) dari taksiran.`;
}
async function saveNewTitipan(){
  const customerId = document.getElementById('tt-customer').value;
  const nama = document.getElementById('tt-nama').value.trim();
  const taksiran = getMoneyInput('tt-taksiran');
  const pinjaman = getMoneyInput('tt-pinjaman');
  const tarifJasaPerBulan = getMoneyInput('tt-jasa');
  const tenorBulan = Number(document.getElementById('tt-tenor').value);
  const catatan = document.getElementById('tt-catatan').value.trim();
  if(!customerId || !nama || !taksiran || !pinjaman){ toast('Data belum lengkap', 'Nasabah, nama barang, taksiran, dan dana talangan wajib diisi.', true); return; }
  if(pinjaman > taksiran){ toast('Dana talangan terlalu besar', 'Dana talangan tidak boleh melebihi nilai taksiran barang.', true); return; }
  const c = STATE.customers.find(x=>x.id===customerId);
  const t = {
    id: uid('TT'), customerId, kategori: titipanCatBuffer, namaBarang: nama,
    taksiran, pinjaman, tarifJasaPerBulan, tenorBulan,

  await dbSet('titipan', [t]);

  `);

function rupiahJS(n){ return rupiah(n); }
async function saveBayarJasa(id){
  const t = STATE.titipan.find(x=>x.id===id);
  if(!t) return;
  const bulan = Number(document.getElementById('bj-bulan').value);
  const total = bulan * t.tarifJasaPerBulan;
  t.totalJasaDibayar = (t.totalJasaDibayar||0) + total;
  t.riwayat = t.riwayat||[];
  t.riwayat.push({ id: uid('R'), type:'perpanjang', amount: total, bulan, date: new Date().toISOString() });
  // Perpanjang jatuh tempo sejumlah bulan yang dibayar
  t.tenorBulan = t.tenorBulan + bulan;
  await dbSet('titipan', [t]);
  const c = STATE.customers.find(x=>x.id===t.customerId);
  addLog(`Jasa penitipan dibayar: ${t.namaBarang} (${c?c.nama:''}) — ${rupiah(total)} untuk ${bulan} bulan`, 'setor');
  toast('Pembayaran tercatat', `Jasa penitipan ${rupiah(total)} sudah tercatat, jatuh tempo diperpanjang.`);
  closeModal();
  render('titipan');
}

function openLelang(id){
  const t = STATE.titipan.find(x=>x.id===id);
  if(!t) return;
  openModal(`
    <div class="modal-head"><h3>Tandai Barang Terjual</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="login-hint">${t.namaBarang} — dana talangan ${rupiah(t.pinjaman)}</div>
      <div class="field"><label>Harga Jual/Lelang (Rp)*</label><input id="ll-harga" type="text" inputmode="numeric" placeholder="0" oninput="formatMoneyInput(this)" style="font-weight:700;"></div>
      <div class="login-hint" style="margin-top:10px;">Sisa hasil jual setelah menutup dana talangan (dan jasa tertunggak bila ada) adalah hak nasabah dan wajib dikembalikan — sesuai prinsip syariah.</div>
    </div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveLelang('${t.id}')">Konfirmasi Terjual</button></div>
  `);
}
async function saveLelang(id){
  const t = STATE.titipan.find(x=>x.id===id);
  if(!t) return;
  const harga = getMoneyInput('ll-harga');
  if(!harga){ toast('Data belum lengkap', 'Isi harga jual terlebih dahulu.', true); return; }
  t.status = 'terjual';
  t.riwayat = t.riwayat||[];
  t.riwayat.push({ id: uid('R'), type:'lelang', amount: harga, date: new Date().toISOString() });
  await dbSet('titipan', [t]);
  const c = STATE.customers.find(x=>x.id===t.customerId);
  const sisaHakNasabah = Math.max(0, harga - t.pinjaman);
  addLog(`Barang dilelang: ${t.namaBarang} (${c?c.nama:''}) — terjual ${rupiah(harga)}`, 'info');
  toast('Ditandai terjual', sisaHakNasabah>0 ? `Sisa hak nasabah dari hasil jual: ${rupiah(sisaHakNasabah)} — pastikan dikembalikan.` : 'Barang sudah ditandai terjual.');
  closeModal();
  render('titipan');
}
async function deleteTitipan(id){
  const t = STATE.titipan.find(x=>x.id===id);
  if(!t) return;
  if(!confirm(`Hapus riwayat titipan "${t.namaBarang}"? Data ini sudah selesai (ditebus/terjual) dan hanya akan dihapus dari daftar.`)) return;
  STATE.titipan = STATE.titipan.filter(x=>x.id!==id);
  await fbDeleteOne('titipan', id);
  addLog(`Riwayat titipan dihapus: ${t.namaBarang}`, 'info');
  toast('Riwayat dihapus', `"${t.namaBarang}" sudah dihapus dari daftar.`);
  render('titipan');
}

/* ============================= LAPORAN ============================= */
function viewLaporan(tab){
  const now = new Date();
  let rows = [], title='';
  if(tab==='harian'){
    title='Laporan Harian (7 hari terakhir)';
    rows = [...Array(7)].map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); const key=d.toISOString().slice(0,10);
      const tx = STATE.transactions.filter(t=>t.date.slice(0,10)===key);
      return { label: fmtDate(d), setor: tx.filter(t=>t.type==='setor').reduce((a,t)=>a+t.amount,0), tarik: tx.filter(t=>t.type==='tarik').reduce((a,t)=>a+t.amount,0), count: tx.length };
    });
  } else if(tab==='bulanan'){
    title='Laporan Bulanan (6 bulan terakhir)';
    rows = [...Array(6)].map((_,i)=>{ const d=new Date(now.getFullYear(), now.getMonth()-i, 1); const key=d.toISOString().slice(0,7);
      const tx = STATE.transactions.filter(t=>t.date.slice(0,7)===key);
      return { label: d.toLocaleDateString('id-ID',{month:'long', year:'numeric'}), setor: tx.filter(t=>t.type==='setor').reduce((a,t)=>a+t.amount,0), tarik: tx.filter(t=>t.type==='tarik').reduce((a,t)=>a+t.amount,0), count: tx.length };
    });
  } else if(tab==='tahunan'){
    title='Laporan Tahunan';
    const years = [...new Set(STATE.transactions.map(t=>t.date.slice(0,4)))]; if(!years.includes(String(now.getFullYear()))) years.push(String(now.getFullYear()));
    rows = years.sort().reverse().map(y=>{ const tx = STATE.transactions.filter(t=>t.date.slice(0,4)===y);
      return { label:y, setor: tx.filter(t=>t.type==='setor').reduce((a,t)=>a+t.amount,0), tarik: tx.filter(t=>t.type==='tarik').reduce((a,t)=>a+t.amount,0), count: tx.length };
    });
  } else if(tab==='staff'){
    title='Laporan per Staff';
    const staffNames = [...new Set(STATE.transactions.map(t=>t.staff))];
    rows = staffNames.map(s=>{ const tx = STATE.transactions.filter(t=>t.staff===s);
      return { label:s, setor: tx.filter(t=>t.type==='setor').reduce((a,t)=>a+t.amount,0), tarik: tx.filter(t=>t.type==='tarik').reduce((a,t)=>a+t.amount,0), count: tx.length };
    });
  } else if(tab==='saldo'){
    title='Laporan Saldo Nasabah';
    rows = STATE.customers.map(c=>({ label:c.nama, setor:c.totalSetor, tarik:c.totalTarik, count:c.saldo }));
  }
  const tabs = [['harian','Harian'],['bulanan','Bulanan'],['tahunan','Tahunan'],['staff','Per Staff'],['saldo','Saldo Nasabah']];
  return `
  <div class="page-head no-print"><div><h2>Laporan</h2><p>Ringkasan performa tabungan &amp; transaksi</p></div>
  <button class="btn btn-outline btn-sm" onclick="window.print()">Cetak</button></div>
  <div class="report-tabs no-print">${tabs.map(([k,l])=>`<button class="rtab ${tab===k?'active':''}" onclick="document.getElementById('page-root').innerHTML=viewLaporan('${k}')">${l}</button>`).join('')}</div>
  <div class="panel">
    <div class="panel-head"><h3>${title}</h3></div>
    <div class="table-wrap"><table>
      <thead><tr><th>${tab==='staff'?'Staff':tab==='saldo'?'Nasabah':'Periode'}</th><th>Total Setoran</th><th>Total Penarikan</th><th>${tab==='saldo'?'Saldo Saat Ini':'Jumlah Transaksi'}</th></tr></thead>
      <tbody>${rows.length? rows.map(r=>`<tr><td><b>${r.label}</b></td><td style="color:var(--green); font-weight:600;">${rupiah(r.setor)}</td><td style="color:var(--red); font-weight:600;">${rupiah(r.tarik)}</td><td>${tab==='saldo'?rupiah(r.count):r.count}</td></tr>`).join('') : `<tr><td colspan="4"><div class="empty-state">Belum ada data</div></td></tr>`}</tbody>
    </table></div>
  </div>`;
}

async function saveNewUser(){
  const name = document.getElementById('u-name').value.trim();
  const username = document.getElementById('u-username').value.trim();
  const password = document.getElementById('u-password').value;
  const role = document.getElementById('u-role').value;
  if(!name || !username || !password){ toast('Data belum lengkap', 'Nama, username, dan password wajib diisi.', true); return; }
  if(password.length<6){ toast('Password terlalu pendek', 'Minimal 6 karakter.', true); return; }
  if(STATE.users.some(u=>u.username.toLowerCase()===username.toLowerCase())){ toast('Username sudah dipakai', 'Gunakan username lain.', true); return; }
  try{
    // Pakai instance Firebase app kedua supaya sesi login Admin yang aktif tidak ikut tertimpa
    const secName = 'staff-create-'+Date.now();
    const secApp = firebase.initializeApp(getFbConfig(), secName);
    const secAuth = secApp.auth();
    const cred = await secAuth.createUserWithEmailAndPassword(usernameToEmail(username), password);
    const newUid = cred.user.uid;
    await secAuth.signOut();
    await secApp.delete();
    await db.collection('profiles').doc(newUid).set({ name, username: username.toLowerCase(), role });
    STATE.users = await fbLoadProfiles();
    addLog(`Staff baru ditambahkan: ${name} (${username})`, 'info');
    toast('Staff ditambahkan', `${name} bisa login dengan username ${username}.`);
    closeModal();
    render('pengaturan');
  }catch(err){ toast('Gagal membuat akun', err.message, true); }
}
function openEditUser(id){
  const u = STATE.users.find(x=>x.id===id);
  if(!u) return;
  const isSelf = u.id===STATE.currentUser.id;
  openModal(`
    <div class="modal-head"><h3>Edit Staff</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Nama Lengkap</label><input id="u-name" value="${u.name}"></div>
      <div class="field"><label>Username</label><input id="u-username" value="${u.username}"></div>
      <div class="field"><label>Role</label><select id="u-role"><option ${u.role==='Staff'?'selected':''}>Staff</option><option ${u.role==='Admin'?'selected':''}>Admin</option></select></div>
      ${isSelf ? `<div class="field"><label>Password Baru (opsional, untuk akun saya sendiri)</label><input id="u-password" type="text" placeholder="Kosongkan jika tidak diubah"></div>` : `<div class="login-hint">Untuk mereset password staff lain, gunakan Firebase Console → Authentication → Users → pilih akun → Reset Password. Ini demi keamanan, hanya pemilik akun yang bisa mengganti passwordnya sendiri lewat aplikasi.</div>`}
    </div>
