  `);
}
async function updateUser(id){
  const u = STATE.users.find(x=>x.id===id);
  if(!u) return;
  const name = document.getElementById('u-name').value.trim();
  const username = document.getElementById('u-username').value.trim();
  const role = document.getElementById('u-role').value;
  const passwordEl = document.getElementById('u-password');
  const password = passwordEl ? passwordEl.value : '';
  if(!name || !username){ toast('Data belum lengkap', 'Nama dan username wajib diisi.', true); return; }
  if(STATE.users.some(x=>x.id!==id && x.username.toLowerCase()===username.toLowerCase())){ toast('Username sudah dipakai', 'Gunakan username lain.', true); return; }
  if(u.role==='Admin' && role==='Staff' && STATE.users.filter(x=>x.role==='Admin').length<=1){ toast('Tidak bisa diubah', 'Minimal harus ada 1 akun Admin.', true); return; }
  try{
    await db.collection('profiles').doc(id).update({ name, username: username.toLowerCase(), role });
    if(password && id===STATE.currentUser.id){
      if(password.length<6){ toast('Password terlalu pendek', 'Minimal 6 karakter.', true); }
      else{
        try{ await auth.currentUser.updatePassword(password); }
        catch(pwErr){
          if(pwErr.code==='auth/requires-recent-login') toast('Perlu login ulang', 'Untuk keamanan, silakan logout lalu login lagi sebelum mengganti password.', true);
          else toast('Gagal mengubah password', pwErr.message, true);
        }
      }
    }
    STATE.users = await fbLoadProfiles();
    if(id===STATE.currentUser.id){ STATE.currentUser.name=name; STATE.currentUser.username=username.toLowerCase(); STATE.currentUser.role=role; document.getElementById('side-username').textContent=name; document.getElementById('side-role').textContent=role; }
    addLog(`Data staff diperbarui: ${name} (${username})`, 'info');
    toast('Tersimpan', `Data ${name} berhasil diperbarui.`);
    closeModal();
    render('pengaturan');
  }catch(err){ toast('Gagal menyimpan', err.message, true); }
}
async function deleteUser(id){
  const u = STATE.users.find(x=>x.id===id);
  if(!u) return;
  if(u.id===STATE.currentUser.id){ toast('Tidak bisa dihapus', 'Anda tidak bisa menghapus akun sendiri saat sedang login.', true); return; }
  if(u.role==='Admin' && STATE.users.filter(x=>x.role==='Admin').length<=1){ toast('Tidak bisa dihapus', 'Minimal harus ada 1 akun Admin.', true); return; }
  if(!confirm(`Hapus akun staff "${u.name}"? Akun ini tidak akan bisa login lagi.\n\n(Catatan: akun otentikasinya bisa dihapus permanen lewat Firebase Console → Authentication → Users bila diperlukan.)`)) return;
  try{
    await db.collection('profiles').doc(id).delete();
    STATE.users = await fbLoadProfiles();
    addLog(`Staff dihapus: ${u.name} (${u.username})`, 'info');
    toast('Staff dihapus', `${u.name} sudah dihapus dari daftar staff dan tidak bisa masuk lagi.`);
    render('pengaturan');
  }catch(err){ toast('Gagal menghapus', err.message, true); }
}

function backupData(){
  const payload = { settings: STATE.settings, customers: STATE.customers, transactions: STATE.transactions, logs: STATE.logs, goals: STATE.goals, titipan: STATE.titipan, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`backup-tabungan-customer-${todayKey()}.json`; a.click(); URL.revokeObjectURL(url);
  addLog('Backup data diunduh', 'info');
}
function restoreData(e){
  const file = e.target.files[0]; if(!file) return;
  if(!confirm('Memulihkan cadangan akan menimpa seluruh data nasabah & transaksi saat ini. Lanjutkan?')) return;
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const payload = JSON.parse(reader.result);
      if(payload.settings) STATE.settings = payload.settings;
      if(payload.customers) STATE.customers = payload.customers;
      if(payload.transactions) STATE.transactions = payload.transactions;
      if(payload.logs) STATE.logs = payload.logs;
      if(payload.goals) STATE.goals = payload.goals;
      if(payload.titipan) STATE.titipan = payload.titipan;
      await dbSet('agent-settings', STATE.settings);
      await dbSet('customers', STATE.customers);
      await dbSet('transactions', STATE.transactions);
      await fbSaveArray('logs', STATE.logs);
      await dbSet('goals', STATE.goals);
      await dbSet('titipan', STATE.titipan);
      addLog('Data dipulihkan dari file cadangan', 'info');
      toast('Berhasil dipulihkan', 'Data telah dikembalikan dari cadangan.');
      render('dashboard');
    }catch(err){ toast('Gagal memulihkan', 'File cadangan tidak valid.', true); }
  };
  reader.readAsText(file);
}

/* ============================= VIEW-SPECIFIC BINDINGS ============================= */
function bindViewEvents(view){
  if(view==='kartu') setTimeout(renderQRIfNeeded, 30);
}
</script>
